# ============================================================================

security_posture:

  m1_mvp_demo:
    overall: "POC-level, demo-only, rehearsed — but with a strict operational minimum floor"
    operational_minimums:
      - no_hardcoded_secrets_anywhere_CI_scan_enforced
      - least_privilege_demo_exchange_account (trade-only scope, never withdraw)
      - encrypted_secret_storage_even_in_demo_environment
      - append_only_audit_log_for_every_trade_action_even_in_demo
      - explicit_live_trade_confirmation_required_in_UI_per_trade
      - emergency_stop_button_in_dashboard_that_halts_all_bots_within_1s
      - demo_account_has_strict_dollar_caps_per_trade_and_daily
      - exchange_api_keys_rotated_before_every_investor_meeting
      - no_user_PII_stored_beyond_what_the_demo_requires
    auth: firebase_email_link_or_single_oauth_provider_ok
    deployment_surface: single_demo_environment_with_allowlisted_ip
    penetration_testing: not_required
    justification: >
      M1 is a rehearsed investor demo with a known presenter. Threat
      model is narrow. Full production hardening would delay the investor
      moment by weeks. However: exchange API keys are always trade-only
      (never withdraw), secrets are never in code, and every trade
      action is audited — these are non-negotiable even at demo-grade.
      Everything else ramps in M2.

  m2_v1_0:
    overall: "Production-grade baseline from day one of this milestone"
    auth: firebase_with_mfa_enforced
    exchange_credentials:
      storage: google_secret_manager_only
      scope_requirement: trade_only_never_withdraw
      rotation: automated_quarterly_plus_on_demand
      per_user_encryption: envelope_encryption_with_kms_keys
    api_surface:
      versioned: true
      rate_limited: true
      idempotent_for_order_endpoints: true
    user_data:
      kyc_document_storage: encrypted_at_rest_with_kms
      pii_access_logging: mandatory
      retention_policy: required_and_documented
    logging_and_audit:
      append_only_audit_log_for_trade_actions: true
      log_retention_minimum_days: 365
    network:
      internal_traffic_mtls: preferred
      public_endpoints_waf: required
    testing:
      threat_model_per_service: required
      pre_merge_security_scan: required
      penetration_test_before_pilot_launch: required
    compliance_mapping_targets: [soc2_type_1_groundwork]

  m3_v1_1:
    overall: "M2 baseline plus multi-asset and advisory surfaces hardening"
    additions:
      - stocks_broker_credential_handling_matches_crypto
      - rag_pipeline_input_sanitization_required
      - cross_asset_position_reconciliation_audit

  m4_v1_2:
    overall: "M3 baseline plus commercial hardening"
    additions:
      - creator_publishing_moderation_pipeline
      - billing_pii_scope_minimization
      - fraud_monitoring_on_subscriptions
      - pen_test_before_friendly_external_launch


