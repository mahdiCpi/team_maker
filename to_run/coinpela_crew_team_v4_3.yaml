# ============================================================================
# AGENT BEHAVIOR POLICY
# ============================================================================

agent_behavior_policy:

  # ─────────────────────────────────────────────────────────────────────────
  # FILE WRITING — CRITICAL RULE (violation causes SyntaxErrors at runtime)
  # ─────────────────────────────────────────────────────────────────────────
  file_writing_policy: >
    Agents MUST use the code_writer tool or git_account update_repo_file to
    write ALL source code files (Python, TypeScript, YAML, Dockerfile, etc.).
    NEVER use bash echo, cat heredoc (<<EOF), printf, or any shell command
    to write source code. Reason: bash single-quote escaping (the '\''
    pattern) is silently injected into Python f-strings and produces
    SyntaxError that the agent cannot detect at write time. Example of the
    corruption: config["key"] written via bash heredoc becomes
    config['\'\'key'\''] in the file — a SyntaxError. The code_writer tool
    writes byte-for-byte exactly what the agent specifies.
    This rule has no exceptions. Even one-line files must use code_writer.

  # ─────────────────────────────────────────────────────────────────────────
  # TEST AND VERIFICATION MANDATE — AGENTS OWN THEIR CODE'S CORRECTNESS
  # ─────────────────────────────────────────────────────────────────────────
  test_and_verification_mandate: >
    Every agent that writes code is responsible for that code's correctness.
    The delivery pipeline is:
      1. Write all files using code_writer (never bash).
      2. SYNTAX CHECK — Python: python3 -m py_compile <file> for each .py file.
         TypeScript: npx tsc --noEmit from the repo root. Both must exit 0.
      3. RUN UNIT TESTS — test_runner("python -m pytest {repo}/tests/ -v --tb=short")
         or equivalent. ALL tests must pass. Zero tolerance for red tests.
      4. FIX FAILURES — If a test fails: read the traceback, identify the bug,
         fix the source code, re-run. Maximum 3 fix cycles before escalating to
         PM via notify. Never skip a test or weaken an assertion to make it pass.
      5. SMOKE TEST — For every service: confirm it starts cleanly.
         Python/FastAPI: test_runner("cd {repo} && timeout 10 python3 -c
           'from src.app import app; print(\"import OK\")'")
         Frontend: test_runner("cd {repo} && npx tsc --noEmit && echo 'TS OK'")
      6. Only after steps 2-5 all succeed: create branch, push, open PR, merge.
    Delivering code that fails tests is a policy violation equivalent to not
    delivering. The QA agent will re-run tests — passing QA is not a
    substitute for the agent running their own tests first.

  # ─────────────────────────────────────────────────────────────────────────
  # BOUNDARY CONDITION TESTING — special rules for quant and time-based code
  # ─────────────────────────────────────────────────────────────────────────
  boundary_condition_testing: >
    Quant and time-based code has a class of bugs that only appear at boundary
    conditions. Required checks before delivery:
    - Backtest for exactly N days: verify num_trades == expected, not expected+1.
      Off-by-one is the most common backtest bug. Test with an explicit mock
      that produces exactly N*granularity_hours candles (not N+1).
    - Strategy stop-loss: verify it triggers correctly at exactly the threshold,
      not one tick past it.
    - DCA interval: verify the strategy fires on tick 0 as well as subsequent
      intervals. Test with both interval_hours=1 and interval_hours=24.
    - Metrics: verify Sharpe ratio, ROI, and drawdown are finite floats (not
      NaN or Inf) when price is flat, trending up, and trending down.

  code_quality_principles: >
    All agents writing code MUST follow these engineering principles.
    Encapsulation and abstraction: hide implementation details behind interfaces.
    DRY (Don't Repeat Yourself): extract shared logic into reusable units.
    KISS (Keep It Simple, Stupid): prefer simple, direct solutions over clever ones.
    YAGNI (You Aren't Gonna Need It): do not build features not required now.
    SOLID: Single Responsibility, Open/Closed, Liskov Substitution, Interface
    Segregation, Dependency Inversion — apply to every module and class.
    GRASP: assign responsibilities to the class that has the most natural reason
    to own them (Information Expert, Creator, Controller, Low Coupling,
    High Cohesion).
    CQS (Command Query Separation): methods either change state or return data,
    never both.
    Design patterns where appropriate: Observer, Strategy, Chain of Responsibility,
    Template Method, Mediator, Visitor, State, Iterator.
    Modularity for integrations: never hard-code a single vendor. Any external
    service (exchange feed, broker API, AI provider) MUST be accessed through
    an interface/abstract class so providers can be swapped without touching
    business logic. Example: MarketDataProvider interface with CoinbaseProvider,
    AlpacaProvider, IBKRProvider as concrete implementations — never call
    Coinbase WebSocket directly from business code.
  decisiveness: >
    Every agent MUST work independently and decisively. Agents MUST NOT request
    reviews, approvals, or input from other agents unless the task explicitly
    requires it. If blocked by missing tools or access, the agent documents the
    limitation briefly and moves on. Agents MUST NOT add review comments on
    work that already meets the stated requirements. Agents MUST NOT loop or
    retry the same failed tool call more than twice — document the failure and
    proceed.
  mandatory_context_reading: >
    Agents MUST read context (Figma PDF, milestone doc) BEFORE producing any
    code output. context_reader and figma_reader calls are mandatory at the
    start of any coding task. For design and frontend tasks: call
    figma_reader(action=pages/components/styles) or
    context_reader('Design_File.pdf') covering all 30 pages before writing
    a single line of code. For backend and quant tasks: call
    context_reader('CoinPela_Milestone_Execution_Plan_Detailed_Team_v2.docx')
    before writing code. Producing code without reading context first is a
    policy violation.
  max_iter_per_agent: 30
  inter_agent_communication: minimise — only when task explicitly requires it

  # ─────────────────────────────────────────────────────────────────────────
  # AGENT DELIVERY CHECKLIST — every coding agent must complete before PR
  # ─────────────────────────────────────────────────────────────────────────
  # ─────────────────────────────────────────────────────────────────────────
  # FULL 14-STEP CODING WORKFLOW (from coding_agents_specs.txt)
  # ─────────────────────────────────────────────────────────────────────────
  coding_agent_workflow: >-
    Every coding agent follows these 14 steps. No shortcuts.
    1. Read final_project_plan.md + acceptance_criteria + existing code.
    2. State scope: files_to_change, files_NOT_to_touch, assumptions, risks.
    3. Pull latest main, inspect diff, create feature branch.
    4. Inspect existing tests before coding.
    5. Write or update tests first (unit + smoke + contract if API changes).
    6. Implement the smallest correct change.
    7. Run lint, type checks, unit tests, smoke test — ALL must pass.
    8. Review own diff — remove accidental changes.
    9. Update documentation in same branch (README, API docs, env vars).
    10. Commit and push feature branch.
    11. Open PR with evidence: diff summary, test output, API sample, demo_impact.
    12. Code reviewer reviews correctness, security, tests, architecture, regression risk.
    13. Coding agent revises until reviewer approves.
    14. Reviewer merges. Agent confirms merge state, notifies PM.

  scope_confirmation_policy: >-
    Before coding, every agent MUST write a scope_confirmation:
      intended_change, files_expected_to_change, files_not_to_touch,
      acceptance_criteria (from final_project_plan.md), demo_impact,
      security_flags (credentials/orders/audit/permissions touched?).
    If security_flags=YES, PR requires elevated review by both
    product_architect_tech_lead AND qa_reviewer_release_gatekeeper.

  no_merge_without_evidence: >-
    Reviewers must NOT approve without evidence in the PR body:
      test_output (pass counts), lint_output (zero errors),
      smoke_test result, git_diff_summary (only expected files changed),
      api_sample (request/response), demo_impact (which demo step affected).
    Reviewing words instead of evidence is a policy violation.

  # ─────────────────────────────────────────────────────────────────────────
  # SUGGESTION 1 — NO AUTO-MERGE / HUMAN APPROVAL GATE
  # ─────────────────────────────────────────────────────────────────────────
  merge_approval_gate: >-
    merge_pr is BLOCKED by default (MERGE_APPROVAL_REQUIRED=true in run.sh).
    Only the release_git_agent may call merge_pr, and only after:
      1. Code reviewer (qa_reviewer_release_gatekeeper) has left an explicit
         approval comment on the PR.
      2. QA has confirmed all tests pass (pytest output in PR body).
      3. A human (founder or supervisor) sets MERGE_APPROVAL_REQUIRED=false
         OR uses a dedicated /approve-merge command.
    Coding agents (backend_engineer, frontend_engineer, quant_ml_engineer)
    NEVER call merge_pr. Their workflow ends at create_pr.
    The release_git_agent is a separate role with distinct permissions.
    This rule is enforced at the tools.py layer — merge_pr returns BLOCKED
    if MERGE_APPROVAL_REQUIRED=true regardless of which agent calls it.

  # ─────────────────────────────────────────────────────────────────────────
  # SUGGESTION 2 — CACHED ERROR LOOP DETECTION
  # ─────────────────────────────────────────────────────────────────────────
  cached_error_detection: >-
    tools.py maintains a FailureTracker per task execution.
    If the same tool call (same action + same params) fails twice:
      - The tool returns an [ESCALATE] message instead of the error
      - The agent MUST stop and report the blocker to the manager agent
      - The agent must NOT retry the same call again
      - The manager decides the recovery path
    The tracker resets at the start of each new task (reset_failure_tracker()
    is called in _on_task_done). This prevents infinite cached-error loops
    where CrewAI serves the same tool error from cache 40+ times.
    Implementation: tools.py _FAILURE_TRACKER dict, keyed by
    MD5(tool_name:action:sorted_params). Threshold: 2 identical failures.

  # ─────────────────────────────────────────────────────────────────────────
  # SUGGESTION 3 — TOOL PRE-TESTING + CONCRETE EXAMPLES
  # ─────────────────────────────────────────────────────────────────────────
  tool_usage_policy: >-
    Every tool call MUST include a complete JSON body with all required fields.
    NEVER call a write tool with partial input. NEVER invent field names.
    If a tool call fails because of missing fields, repair the JSON ONCE.
    If it fails again, stop and report the blocker to the manager.

    REQUIRED EXAMPLES (copy exactly — only change values, never structure):

    create_branch:
      body='{"branch":"feat/backend-engineer","from_branch":"main"}'

    commit_and_push:
      body='{"local_path":"coinpela-buddy","branch":"feat/backend-engineer",
            "message":"feat: implement identity service with JWT auth"}'

    update_repo_file:
      body='{"path":"src/app.py",
            "content":"from fastapi import FastAPI\napp = FastAPI()\n\n@app.get(\"/health\")\ndef health(): return {\"status\": \"ok\"}",
            "message":"feat: add health endpoint",
            "branch":"feat/backend-engineer"}'
      NOTE: content is the COMPLETE file, not a diff or partial.

    create_pr:
      body='{"title":"feat: identity service complete",
            "body":"## Changes\n- JWT HS256 auth\n- bcrypt hashing\n\n## Evidence\n- pytest: 8/8 pass\n- Service starts: import OK",
            "head":"feat/backend-engineer","base":"main"}'

    get_repo_file:
      body='{"path":"src/app.py","branch":"main"}'

    TOOL PRE-TEST PROTOCOL (run at start of each coding task):
      Before writing any product code, each coding agent MUST verify its
      tools work by calling:
        git_account(action="list_repos", repo="mahdiCpi")
      If this returns an error, stop immediately and report to manager.
      Do not attempt any write operations until read operations succeed.

  # ─────────────────────────────────────────────────────────────────────────
  # SUGGESTION 4 — AGENT PERMISSION LEVELS
  # ─────────────────────────────────────────────────────────────────────────
  agent_permission_levels: >-
    Agents are separated by permission level. Violating these boundaries
    is a policy error that the team_maker must enforce when generating teams.

    LEVEL 1 — Manager / Orchestrator:
      Plans tasks, assigns work, reads state, checks final status.
      Tools: context_reader, code_reader, git_account (READ ONLY actions:
             list_repos, list_prs, list_issues, get_repo_file)
      Cannot: write files, push branches, merge PRs.

    LEVEL 2 — Code Reader / Analyst:
      Reads repos, summarises state. Produces analysis documents.
      Tools: context_reader, code_reader, git_account (read-only)
      Cannot: write files, push, merge.

    LEVEL 3 — Code Writer Agent:
      Writes local patches using code_writer. Creates branches. Pushes to
      feature branches. Opens PRs. STOPS after create_pr.
      Tools: code_writer, code_reader, test_runner, git_account
             (create_branch, commit_and_push, update_repo_file, create_pr)
      Cannot: merge_pr. Never pushes to main directly.

    LEVEL 4 — Test Agent:
      Runs tests and smoke tests. Reports results. No write access.
      Tools: test_runner, code_reader
      Cannot: write files, push, merge.

    LEVEL 5 — Code Reviewer Agent:
      Reviews diffs, security, architecture. Leaves approval comments.
      Tools: code_reader, git_account (list_prs, get_repo_file, add_issue)
      Cannot: write product code, push, merge.

    LEVEL 6 — Release Git Agent (release_git_agent):
      The ONLY agent that may call merge_pr. Only activates after:
      reviewer approval + QA confirmation + human sign-off.
      Tools: git_account (merge_pr only, plus verification reads)
      Cannot: write product code.

    Generated teams MUST respect these levels. Assigning merge_pr to a
    code writer agent is a design error.

  agent_delivery_checklist: >
    CODING AGENTS (Level 3) — checklist before opening a PR.
    Your workflow ENDS at create_pr. Do NOT call merge_pr.
    [ ] TOOL PRE-TEST: git_account(action="list_repos") returns repos — tools work.
    [ ] Scope confirmation written: files_to_change, files_not_to_touch.
    [ ] final_project_plan.md read — acceptance criteria confirmed.
    [ ] Feature branch created: git_account(action="create_branch",
        body={"branch":"feat/your-agent-name","from_branch":"main"})
    [ ] All files written using code_writer (NEVER bash heredoc).
    [ ] python3 -m py_compile on every .py file — zero errors.
    [ ] npx tsc --noEmit in frontend repos — zero errors.
    [ ] python -m pytest tests/ -v — all tests GREEN.
    [ ] Service smoke test passes (import succeeds, server starts).
    [ ] Git diff reviewed — no changes to files_not_to_touch.
    [ ] Documentation updated in same branch.
    [ ] git_account commit_and_push to feature branch (NOT main).
    [ ] git_account create_pr with COMPLETE evidence in PR body.
    [ ] STOP. Notify manager that PR is open and ready for review.
    [ ] DO NOT call merge_pr — that is release_git_agent's responsibility.

    RELEASE GIT AGENT (Level 6) — checklist before merging.
    [ ] Confirmed: reviewer has approved PR (approval comment exists).
    [ ] Confirmed: QA evidence is in PR body (test output, smoke test).
    [ ] Confirmed: MERGE_APPROVAL_REQUIRED=false (human granted approval).
    [ ] git_account merge_pr with method=squash.
    [ ] Pull main and confirm the merged file exists.
    [ ] Notify PM: merged SHA, changed files, status.

  # ─────────────────────────────────────────────────────────────────────────
  # WORKSPACE CONFIGURATION — generated runner must set these env vars
  # ─────────────────────────────────────────────────────────────────────────
  # ── HELPER TOOLS — eliminate random trial-and-error in coding agents ─────
  helper_tools_policy: >-
    Every coding agent (code_writer in tool list) MUST have two helper tools:
    task_decomposer and code_surgeon. Never omit these when generating a team.
    task_decomposer: call at the START of every complex task. Breaks it into
    ordered atomic single-file steps. NEVER attempt a multi-file task without
    decomposing it first. Small steps prevent context-loss and empty writes.
    code_surgeon: call immediately when code_writer or update_repo_file fails
    with empty content or validation error. Returns complete correct file
    content in one shot. ONE code_surgeon call beats 20 failed guesses.
    Root cause: files >150 lines often lose content between LLM reasoning
    and tool call parameters. code_surgeon regenerates content in a fresh
    dedicated LLM call with full context, solving this reliably.

  workspace_configuration: >
    The generated team runner script MUST export these environment variables:
    WORKSPACE_ROOT: absolute path to the parent of all project git repos.
      Example: if coinpela-frontend lives at /home/user/code/coinpela-frontend,
      set WORKSPACE_ROOT=/home/user/code.
      The file_write tool uses this as the base directory. Agents write to
      WORKSPACE_ROOT/{repo_name}/{file_path}. This ensures files are
      user-owned and pytest can run on them.
    SANDBOX_ENABLED: must be "false".
      When "true", Docker runs as root and creates root-owned files that
      the host user cannot modify and pytest cannot execute. Never use
      SANDBOX_ENABLED=true for a dev agent team.
    CREWAI_VERSION: the installed crewai package must be >= 1.14.3.
      Version 1.14.2 has a bug where Anthropic (Claude) models crash with
      "assistant message prefill". All coding agents use Claude — this
      bug prevents the entire team from working. Run:
        pip install "crewai>=1.14.3" "crewai-tools>=1.14.3"
      before starting any crew.

# ============================================================================
# ESCALATION POLICY
# ============================================================================

escalation_policy:
  human_supervisor_notification_required_for:
    - api_authentication_failures
    - missing_or_invalid_credentials
    - third_party_api_schema_changes
    - exchange_or_broker_connectivity_failures
    - deployment_failures_in_staging_or_production
    - protected_branch_or_git_permission_failures
    - security_incidents_or_secret_exposure_risk
    - legal_or_compliance_uncertainty_that_blocks_execution
    - missing_product_decisions_that_prevent_progress
    - repeated_test_failures_on_critical_path
    - cost_or_error_rate_threshold_breach
    - any_human_gated_action_needed
    - any_definition_of_done_third_rejection_escalation
  notify_channel: founder_alert
  notify_expectation: immediate
  notify_transports: [webhook, email]
  webhook_env: FOUNDER_ALERT_WEBHOOK_URL
  email_env: FOUNDER_ALERT_EMAIL
  alert_payload_requirements:
    - blocker_summary
    - affected_service_or_surface
    - impact_on_current_goal
    - "impact_on_m1_demo (always included while m1 is open)"
    - evidence_logs_or_error_message
    - attempted_remediation_steps
    - proposed_options_or_decision_needed
  fallback_behavior: >
    When blocked, the team alerts the human supervisor immediately and
    continues adjacent unblocked work (mocks, interface contracts, tests,
    documentation, UI placeholders, alternate integrations) whenever
    sensible.


# ============================================================================
# COST AND HEALTH MONITOR  (kill-switch guardian, extended for security)
# ============================================================================

cost_and_health_monitor_policy:

  operating_model: continuous_observer

  watches:
    cost_and_reliability:
      - total_llm_token_spend_per_role
      - total_llm_token_spend_aggregate
      - llm_error_rate_per_provider
      - ci_failure_rate
      - agent_retry_loops
      - rate_limit_hits_per_provider
      - pr_rejection_loop_count_per_ticket
      - ticket_turn_budget_consumption
    security_heuristics:
      - "high_entropy_strings_in_diffs (potential secret leak)"
      - "credential_mishandling_patterns (hardcoded API keys, plaintext storage, logs that echo secrets)"
      - "unsafe_exchange_permission_expansion (any diff that touches withdraw or transfer scope)"
      - "non_custodial_violation_patterns (any code path that would cause CoinPela to touch user funds directly)"
      - "copy_trading_drift (any diff that makes user trades auto-mirror another user's trades without explicit per-trade confirmation)"

  kill_switch:
    authority_to_halt_entire_team: true
    trigger_conditions:
      cost_and_reliability:
        - any_watched_metric_crosses_alert_threshold_and_does_not_recover_within_n_cycles
        - any_single_ticket_exceeds_configured_rejection_loop_ceiling
        - any_single_ticket_crosses_hard_turn_budget
      security:
        - any_heuristic_detects_potential_secret_leak_in_a_diff
        - any_heuristic_detects_credential_mishandling
        - any_diff_expands_exchange_permissions_beyond_trade_only
        - any_diff_violates_non_custodial_constraint
        - any_diff_implements_copy_trading_without_explicit_per_trade_confirmation
      manual:
        - human_supervisor_sends_manual_halt_signal
    on_trigger:
      - stop_all_in_flight_agent_work
      - block_all_new_pr_creation
      - freeze_all_merges
      - emit_halt_notification_via_webhook_and_email_with_trigger_reason
      - emit_halt_notification_via_telegram  
      - write_post_mortem_template_to_repo
    resume_policy: human_supervisor_only

  no_budget_cap_rationale: >
    There is no fixed dollar or token budget. Agents must behave as if
    they were the founder — no wasted cycles, early escalation when
    something looks wrong, and a hard halt when a heuristic trips,
    rather than silently burning tokens or silently risking a security
    incident.

  thresholds_are_tuned_by: cost_and_health_monitor_itself_with_architect_review

  rationale_for_security_in_this_agent: >
    Rather than spawning a 14th role (standalone security guardian),
    the cost_and_health_monitor role already has continuous-observer
    access, threshold authority, and kill-switch authority. Extending
    its trigger set to cover security heuristics keeps the team at 13
    agents while giving security violations the same immediate halt
    power that runaway spend has.


# ============================================================================
# CODE REVIEW AND PR REJECTION FLOW
# ============================================================================

pr_rejection_flow:

  step_1_reviewer_rejects:
    actor: qa_reviewer_release_gatekeeper
    output: structured_rejection_report
    rejection_report_schema:
      - failing_criteria
      - specific_file_and_line_references
      - "severity (blocker | major | minor | nit)  — see definition_of_done"
      - "suggested_category_of_fix (bug | design | security | test | docs)"
    reviewer_constraint: >
      Every finding MUST carry a severity tag. Unlabeled findings are
      treated as `nit` and do not block merge. `minor` and `nit`
      findings also do not block merge. Only `blocker` severity can
      reject a PR outright; `major` rejects only if the writer can
      address it within one revision (otherwise it converts to a
      follow-up ticket).

  step_2_advisor_mediates:
    actor: advisor_agent 
    selection_rule: >
      advisor_agent provider MUST differ from BOTH the reviewer's
      provider (Anthropic) AND the writer's provider for this PR. The
      router walks advisor_pool_ranked and picks the highest-ranked
      eligible entry.
    advisor_pool_ranked: [grok_4_fast_reasoning, gemini_31_pro, gpt_54, grok_4_fast_reasoning]
    output: advisor_guidance
    advisor_guidance_schema:
      verdict:
        type: categorical
        allowed_values:
          - accept_reviewer   # reviewer is right; writer must comply
          - accept_writer     # writer is right; reviewer findings overruled
          - hybrid_fix_plan   # both partially right; specific merged plan
          - escalate          # exceeds advisor confidence; go to architect
      diagnosis_summary:
        type: prose
        max_words: 200
      points_of_agreement_with_reviewer:
        type: list
      points_where_advisor_disagrees_with_reviewer:
        type: list_with_justification
        optional: true
      patch_plan:
        type: structured
        form: list_of_patches
        patch_item_fields:
          - file
          - line_or_range
          - before_text_or_description
          - after_text_or_description
          - severity_of_finding_addressed
          - rationale
      confidence_level:
        type: categorical
        allowed_values: [low, medium, high]
      escalation_threshold: >
        If confidence_level is `low` OR verdict is `escalate`, the
        advisor MUST NOT direct the writer. The ticket goes straight to
        product_architect_tech_lead for a decision.

  step_3_writer_iterates:
    actor: original_writer_role
    input: "original_PR + rejection_report + advisor_guidance"
    max_revisions_per_ticket: 3
    on_third_rejection:
      action: escalate_to_product_architect_tech_lead_per_definition_of_done
      also: pause_ticket_and_continue_other_work

  step_4_reviewer_revalidates:
    actor: qa_reviewer_release_gatekeeper
    policy: >
      On re-review, the reviewer MUST explicitly acknowledge each point
      in the advisor_guidance and state whether it was addressed. Silent
      rejection of advisor points is not allowed. Reviewer MUST NOT
      introduce new `blocker`-severity findings on re-review unless the
      new findings are directly caused by the writer's revisions.


# ============================================================================
# DEFINITION OF DONE  (the halting rule for autonomous agent teams)
# ============================================================================
# LLMs can always find one more thing to improve. Without an explicit stop
# rule, agent teams loop forever and never ship. This section makes
# "done" a machine-checkable condition — not a vibe.
#
# Core principles:
#   * A ticket declares its done_criteria as binary checks BEFORE work
#     starts. When all are true, the ticket is done.
#   * Reviewer findings are classified by severity. Only `blocker` can
#     reject a PR. `Major` must fix in one revision or convert to a
#     follow-up ticket. `Minor` and `nit` never block merge.
#   * A hard revision cap (3) prevents infinite ping-pong.
#   * For M1, the release gate is the DEMO rehearsal — not the code
#     review. Once three consecutive clean end-to-end rehearsals pass,
#     M1 is SHIPPED. Remaining non-blocker findings roll into M2.
# ============================================================================

definition_of_done:

  principle: >
    Work terminates when declared done_criteria are met and no `blocker`
    severity findings remain. Reviewers may NOT reject a PR on the
    basis of taste, preference, or nice-to-haves. Taste becomes a
    follow-up ticket for a later milestone.

  done_criteria_contract:
    when_declared: at_ticket_creation_before_work_starts
    who_declares: program_manager_orchestrator_with_product_architect_tech_lead_approval
    form: checkable_binary_list
    examples:
      - "Coinbase order placement function returns fills within 3s p95"
      - "Plain-language prompt 'buy ETH dips' produces valid bot config per schema"
      - "Marketplace detail page renders seeded listing with subscribe button that writes to state"
      - "Emergency stop button halts all bots within 1s and writes an audit log entry"
    immutability: >
      done_criteria may only be revised by product_architect_tech_lead
      with a written rationale. Scope creep during a ticket is not
      permitted. New findings become new tickets.

  severity_classification:
    blocker:
      definition: "Breaks the ticket's declared done_criteria OR introduces a regression in any M1 demo-arc flow OR introduces a security violation OR violates a product non_negotiable."
      blocks_merge: true
      examples:
        - live trade bypasses explicit user confirmation
        - secret committed to repo
        - demo arc flow breaks end-to-end
        - audit log missing for a trade action
        - diff expands exchange scope beyond trade-only
        - code path would cause CoinPela to touch user funds directly
    major:
      definition: "Reduces quality meaningfully but does not break done_criteria, does not regress the demo arc, and does not violate security or non_negotiables."
      blocks_merge: only_if_writer_can_address_within_one_revision
      conversion_rule: "If not fixable in one revision, converts to a follow-up ticket for the next milestone's backlog."
      examples:
        - error handling is coarse
        - component structure could be cleaner
        - test coverage is thin on an edge case
    minor:
      definition: "Nice-to-have improvement."
      blocks_merge: NEVER
      disposition: backlog_or_ignore
    nit:
      definition: "Style or preference."
      blocks_merge: NEVER
      disposition: ignore_unless_reviewer_can_fix_inline

  reviewer_constraint: >
    qa_reviewer_release_gatekeeper MUST tag every finding with a severity
    class. Findings without a severity tag are treated as `nit` and do
    not block merge. Reviewers who repeatedly tag taste findings as
    `blocker` trigger an architect audit.

  revision_cap:
    max_revisions_per_ticket: 3
    cycle_definition: one_writer_submission_plus_one_review_round
    on_third_rejection:
      decision_authority: product_architect_tech_lead
      allowed_outcomes:
        - "ship_as_is (with remaining non-blocker findings auto-converted to backlog tickets)"
        - defer_ticket_to_later_milestone
        - split_ticket_into_smaller_pieces
      forbidden_outcomes:
        - send_back_for_a_fourth_revision
    rationale: >
      Three revisions is the hard cap. After three, either the scope was
      wrong (split), the quality bar was unreachable (ship or defer), or
      the reviewer and writer genuinely disagree (architect decides).
      Continuing beyond three revisions always means the team is looping.

  force_ship_authority:
    holders: [program_manager_orchestrator, product_architect_tech_lead]
    requires: both_agree
    condition: "No remaining findings are severity `blocker`."
    effect: >
      Merges PR despite open non-blocker findings; findings convert to
      follow-up tickets automatically.

  m1_special_rule:
    the_release_gate_is_the_demo: >
      For M1, the release gate is NOT code review. It is three
      consecutive clean end-to-end demo rehearsals plus the fallback
      demo artifacts listed in m1_feature_freeze. Once the rehearsal
      gate passes, M1 is SHIPPED. Any remaining non-blocker findings
      roll into the M2 backlog automatically. Neither qa_reviewer nor
      product_architect_tech_lead may block M1 release for code-quality
      concerns after the rehearsal gate passes.
    demo_is_king: true
    still_blocking_after_rehearsal_gate:
      - blocker_severity_security_findings
      - blocker_severity_non_negotiable_violations
      - demo_arc_regressions_detected_during_final_rehearsal
    rationale: >
      Investor conviction depends on the demo, not on code taste. A
      cleaner implementation that slips the investor moment is worse
      than a rougher implementation that ships on time with rehearsed
      reliability.

  turn_budget_per_ticket:
    soft_limit: 40_agent_turns
    hard_limit: 80_agent_turns
    on_soft_limit: cost_and_health_monitor_notifies_orchestrator
    on_hard_limit: auto_escalate_to_human_supervisor_with_smallest_unblock_options
    rationale: >
      Token spend tracks agent turns. If a ticket consumes an
      unreasonable number of turns without closing, the team is almost
      certainly looping. Escalate rather than burn tokens.

  the_shipping_test: >
    At any point, the orchestrator can ask: "If we stopped right now,
    does the user get a working version of the declared done_criteria?"
    If yes, ship. Reviewers improve what is shipped in the next ticket,
    not in this one.


# ============================================================================
# WORKFLOW POLICY
# ============================================================================

workflow_policy:
  branching:
    model: trunk_with_feature_branches
    protected_branches: [main, "release/*"]
    naming:
      feature: "feature/{service}/{ticket_id}-{short_name}"
      bugfix:  "bugfix/{service}/{ticket_id}-{short_name}"
      hotfix:  "hotfix/{service}/{ticket_id}-{short_name}"
  pull_requests:
    required: true
    require_ci_pass: true
    required_approvals: 1
    self_approval_allowed: false
    advisor_comment_required_on_reopened_prs: true
    severity_tagging_required: true
    template_sections:
      - summary
      - affected_services
      - milestone_alignment
      - done_criteria_checklist
      - project_board_card_link   # required — see progress_tracking section
      - tests_added_or_updated
      - "security_impact (mandatory from m2; required if touches any security_heuristics surface)"
      - risks
      - rollback_plan
  review_and_release:
    no_direct_commits_to_main: true
    qa_must_review: true
    architect_final_signoff_required: true
    deployment_to_staging: autonomous
    deployment_to_production: human_gated
  documentation:
    require_readme_for_service_or_module: true
    require_contract_notes: true
    require_runbook_updates_for_operational_changes: true


# ============================================================================
# PROGRESS TRACKING  (GitHub Projects v2 — the live visibility layer)
# ============================================================================
# The founder's single "where are we?" surface. Every ticket and PR is
# mirrored on a GitHub Projects v2 board attached to the repo, so
# progress is always visible without a dedicated reporter agent.
# Board upkeep is NOT a separate role — every agent maintains its own
# cards per board_update_protocol below, and platform_devops_engineer
# bootstraps the schema once as part of M1 setup.
# ============================================================================

progress_tracking:

  platform: github_projects_v2
  rationale: >
    Every v4.1 agent already works through GitHub (branches, Issues,
    PRs). GitHub Projects v2 is zero extra infrastructure, zero extra
    auth surface, and has a REST+GraphQL API agents can already call.
    A separate project-reporter agent would duplicate state and
    introduce synchronization drift. Instead, the data stays in one
    place and each agent updates its own cards through the same
    git_issue_manager and pr_creator tools it already uses.

  schema:

    project_name: "CoinPela Delivery"
    item_types: [issue, pull_request]

    custom_fields:

      - name: Milestone
        type: single_select
        options: [M1, M2, M3, M4]
        required: true
        set_by: program_manager_orchestrator_on_ticket_creation

      - name: PriorityScore
        type: number
        required: true
        description: "Computed per priority_policy.computation formula."
        set_by: program_manager_orchestrator_on_ticket_creation
        re_scored_on: milestone_boundary_shift

      - name: M1CriticalPath
        type: boolean
        required: true
        description: "True if ticket scores 5 on critical_path_to_m1_demo. Used for the M1 Demo Readiness view."
        set_by: program_manager_orchestrator_on_ticket_creation

      - name: Owner
        type: single_select
        options:
          - program_manager_orchestrator
          - product_architect_tech_lead
          - design_systems_specialist
          - frontend_engineer
          - backend_engineer
          - quant_ml_engineer
          - platform_devops_engineer
          - qa_reviewer_release_gatekeeper
          - advisor_agent
          - marketplace_ux_strategist
          - marketplace_creator_strategist
          - marketplace_lead
          - cost_and_health_monitor
        required: true
        set_by: program_manager_orchestrator_on_assignment

      - name: Severity
        type: single_select
        options: [blocker, major, minor, nit]
        description: "Populated on PRs by qa_reviewer_release_gatekeeper from its rejection report. Tickets without findings stay unset."
        set_by: qa_reviewer_release_gatekeeper_on_review

      - name: RevisionCycle
        type: number
        description: "How many writer-reviewer cycles this ticket has used. Hard cap is 3 per definition_of_done."
        set_by: qa_reviewer_release_gatekeeper_on_rejection
        auto_color:
          "0": green
          "1": green
          "2": yellow
          "3": red

      - name: TurnBudgetUsed
        type: number
        description: "Agent turns consumed on this ticket so far. Soft limit 40, hard limit 80."
        set_by: cost_and_health_monitor_continuous
        auto_color:
          under_40: green
          "40_to_80": yellow
          over_80: red

      - name: DoneCriteria
        type: text
        required: true
        description: "The machine-checkable checklist declared at ticket creation per definition_of_done.done_criteria_contract."
        set_by: program_manager_orchestrator_on_ticket_creation
        immutable_unless: product_architect_tech_lead_explicit_revision

      - name: Status
        type: single_select
        options:
          - Backlog
          - Ready
          - InProgress
          - InReview
          - Blocked
          - HumanGated
          - Done
          - Deferred
        required: true

      - name: Repo
        type: single_select
        options:
          - coinpela-platform
          - coinpela-frontend
          - coinpela-buddy
          - coinpela-execution
          - coinpela-strategy
          - coinpela-marketplace
          - coinpela-identity
          - coinpela-notifications
          - coinpela-stocks-broker
          - coinpela-advisory
          - coinpela-billing
          - coinpela-moderation
          - cross_repo
        required: true
        description: "Which repo this ticket touches. cross_repo when a change spans multiple repos (e.g., contract + consumer + producer)."
        set_by: program_manager_orchestrator_on_ticket_creation

      - name: ServiceOrSurface
        type: text
        description: "Which ui_surface, service module, or contract this ticket touches. Required per shared_engineering_rules."
        set_by: writer_agent_on_branch_creation

      - name: DemoArc
        type: boolean
        description: "True if this ticket is on the M1 demo arc. Drives protection during m1_feature_freeze."
        set_by: program_manager_orchestrator_on_ticket_creation

      - name: RehearsalGateItem
        type: boolean
        description: "True if this ticket implements or verifies a m1_feature_freeze.demo_rehearsal_checklist item."
        set_by: program_manager_orchestrator_on_ticket_creation

  views:

    - name: "Kanban — Current Sprint"
      type: board
      group_by: Status
      filter: "Status != Done AND Status != Deferred"
      sort: [PriorityScore desc, RevisionCycle desc]
      purpose: "Day-to-day flow view for the founder."

    - name: "M1 Demo Readiness"
      type: board
      group_by: Status
      filter: "Milestone == M1 AND (M1CriticalPath == true OR DemoArc == true OR RehearsalGateItem == true)"
      sort: [PriorityScore desc]
      purpose: >
        The single most important view while M1 is open. Shows only
        demo-arc, critical-path, and rehearsal-gate tickets. If this
        view is clean, the investor demo is on track.

    - name: "Milestone Roadmap"
      type: roadmap
      group_by: Milestone
      sort: [Milestone asc, PriorityScore desc]
      purpose: "Long-arc view across M1 -> M4 for planning conversations."

    - name: "At-Risk Tickets"
      type: table
      filter: "RevisionCycle >= 2 OR TurnBudgetUsed >= 40 OR Status == Blocked OR Status == HumanGated"
      sort: [RevisionCycle desc, TurnBudgetUsed desc]
      purpose: >
        Anything close to a definition_of_done limit or actively
        blocked. Founder glance should never have red cards sitting
        here without an alert.

    - name: "By Owner"
      type: board
      group_by: Owner
      filter: "Status == InProgress OR Status == InReview"
      purpose: "What each agent is actively doing right now."

    - name: "Severity Triage"
      type: table
      filter: "Severity != null"
      sort: [Severity asc, RevisionCycle desc]
      purpose: "Open findings by severity. Blockers at the top."

    - name: "By Repo"
      type: board
      group_by: Repo
      filter: "Status != Done AND Status != Deferred"
      sort: [PriorityScore desc]
      purpose: >
        Cross-repo visibility. Shows active work in each service
        repo side-by-side so you can see whether one service is
        falling behind or whether cross_repo tickets (contract
        changes) are piling up.

    - name: "Cross-Repo Contract Changes"
      type: table
      filter: "Repo == cross_repo OR ServiceOrSurface CONTAINS 'contract'"
      sort: [PriorityScore desc]
      purpose: >
        Contract-first work. Any contract change in
        coinpela-platform plus the consumer/producer tickets that
        track it. Critical while M1 is still wiring services up.

  automations:

    - trigger: issue_created
      action: add_to_project_in_Backlog_status

    - trigger: branch_pushed_referencing_issue
      action: move_card_to_InProgress_and_set_UiSurfaceOrService_from_branch_prefix

    - trigger: pr_opened_referencing_issue
      action: "move_card_to_InReview, link_pr_to_card"

    - trigger: pr_rejected
      action: "increment_RevisionCycle, set_Severity_from_reviewer_findings, if RevisionCycle == 3 move to Blocked"

    - trigger: pr_merged
      action: move_card_to_Done

    - trigger: ticket_deferred_by_architect_on_third_rejection
      action: "move_card_to_Deferred, auto-create follow-up ticket in next milestone's Backlog"

    - trigger: human_gate_label_applied
      action: "move_card_to_HumanGated, emit founder_alert webhook+email"

    - trigger: cost_and_health_monitor_halts_team
      action: "tag all InProgress cards as Blocked with halt_reason, emit founder_alert"


# ============================================================================
# BOARD UPDATE PROTOCOL
# ============================================================================
# What every agent does — no reporter agent required. These rules are the
# contract each role signs by being on the team.
# ============================================================================

board_update_protocol:

  who_updates_what:

    program_manager_orchestrator:
      - Creates the card when a ticket is opened; fills Milestone, PriorityScore, M1CriticalPath, Owner, DoneCriteria, Status=Backlog, DemoArc, RehearsalGateItem.
      - Re-scores PriorityScore when milestone boundaries shift.
      - Moves Backlog -> Ready when dependencies are satisfied.
      - Owns digest posting (see digest_cadence below).

    any_writer_role:
      "[frontend_engineer, backend_engineer, quant_ml_engineer, platform_devops_engineer, design_systems_specialist, marketplace_ux_strategist, marketplace_creator_strategist]":
        - On branch creation: move Status Ready -> InProgress, set ServiceOrSurface (Repo is set by orchestrator at ticket creation but writer verifies it matches the branch's repo).
        - On PR open: link PR to card; move Status InProgress -> InReview (automation also does this as a safety net).
        - On PR merge: automation moves to Done.
        - On becoming blocked: set Status=Blocked with a comment explaining the blocker, and notify orchestrator.
        - On cross-repo changes: open one ticket per affected repo, link them with "blocks/blocked-by" relationships on the board.

    qa_reviewer_release_gatekeeper:
      - On review: set Severity on the card per rejection_report severity classification.
      - On rejection: automation increments RevisionCycle; reviewer confirms the card now shows the correct cycle count.
      - Verifies project_board_card_link is present in every PR it reviews. PRs missing this link are auto-rejected as a process failure (NOT a blocker-severity finding, just a bounce).

    product_architect_tech_lead:
      - On third-rejection decision: move card to Done (ship_as_is), Deferred (defer_ticket_to_later_milestone), or split into new Backlog cards.
      - On M1 feature freeze declaration: add a pinned banner card titled "M1 FEATURE FREEZE DECLARED" with the timestamp and post-freeze policy link.

    marketplace_lead:
      - On milestone marketplace gate decision: post the gate_question answer as a card comment on every marketplace-tagged card for that milestone.

    advisor_agent:
      - On verdict: post the advisor_guidance (verdict + patch plan + confidence) as a structured card comment on the ticket's card.

    cost_and_health_monitor:
      - Updates TurnBudgetUsed continuously.
      - On soft/hard limit breach: tags card and notifies orchestrator.
      - On kill-switch trigger: tags all InProgress cards as Blocked with halt_reason.
      - Watches for board drift (see drift_monitoring below).

  drift_monitoring:
    description: >
      cost_and_health_monitor also watches the board itself as a
      reliability signal. If agents stop updating cards, that's a
      failure mode worth catching early.
    drift_signals:
      - card_stuck_in_same_status_beyond_turn_budget_soft_limit
      - pr_opened_with_no_matching_card
      - card_with_no_owner_for_more_than_one_orchestrator_cycle
      - status_automation_failure_detected_in_github_logs
      - contract_version_mismatch_between_consumer_and_producer_repos
      - service_healthcheck_failing_in_staging_beyond_n_cycles
      - docker_compose_stack_fails_to_come_up_locally_in_ci
    on_drift: alert_orchestrator_and_log_to_founder_digest


# ============================================================================
# DIGEST POSTING  (program_manager_orchestrator duties, formalized)
# ============================================================================

digest_cadence:

  daily_progress_digest:
    posted_by: program_manager_orchestrator
    posted_to: [github_project_overview_comment, founder_alert_webhook]
    frequency: once_per_24_agent_cycles
    format_sections:
      - "M1 status (while M1 open): critical-path cards Done/Total, rehearsal readiness %, fallback artifacts checklist"
      - "Top 5 cards by PriorityScore currently in Status=InProgress or InReview"
      - "At-Risk summary: count of cards with RevisionCycle>=2 or TurnBudgetUsed>=40 or Status=Blocked/HumanGated"
      - "Human-gated items awaiting founder action (with card links)"
      - "Yesterday's merges (card title + Owner + Milestone)"
      - "Cost and health: aggregate token spend trend, any thresholds approached"

  m1_rehearsal_recap:
    posted_by: program_manager_orchestrator
    trigger: every_rehearsal_run_completion
    posted_to: [github_project_M1_Demo_Readiness_view_comment, founder_alert_webhook]
    format_sections:
      - rehearsal_number
      - demo_rehearsal_checklist_pass_fail_per_item
      - total_run_time
      - any_manual_interventions_required
      - "cumulative_consecutive_clean_rehearsals (toward freeze trigger of 3)"
      - fallback_artifacts_readiness_checklist

  weekly_milestone_summary:
    posted_by: program_manager_orchestrator
    frequency: once_per_168_agent_cycles
    posted_to: [github_project_Milestone_Roadmap_view_comment, founder_alert_email]
    format_sections:
      - milestone_acceptance_criteria_status_table
      - cards_completed_this_week_per_milestone
      - cards_deferred_this_week_and_why
      - provider_seat_utilization
      - security_posture_compliance_summary

  investor_ready_signal:
    posted_by: program_manager_orchestrator
    trigger: "m1_feature_freeze declared AND fallback demo artifacts complete AND three rehearsals clean"
    posted_to: [github_project_pinned_card, founder_alert_webhook, founder_alert_email]
    content: "M1 SHIP SIGNAL — investor demo ready. Presenter runbook at <link>. Fallback demo video at <link>."


# ============================================================================
# PLANNING RULES
# ============================================================================

planning_rules:
  - Plan milestone-first, not feature-first.
  - Score every ticket per priority_policy; never schedule on gut feel.
  - M1 tasks outrank non-M1 tasks; M1-critical-path tasks outrank all else while M1 is open.
  - Do not wait for milestone dates; ship as soon as the quality bar is met.
  - Declare done_criteria at ticket creation. Work terminates when criteria are met — not when a reviewer runs out of suggestions.
  - Treat milestones as dependency and acceptance gates, not calendar delays.
  - Protect the current milestone's critical path.
  - Prefer vertical slices that demonstrate user value end to end.
  - Break work into services or modules only when domain boundaries, deployment needs, security needs, or scaling justify it.
  - CoinPela is multi-repo, multi-service from day one; fold work into an existing service only when no clear boundary justifies a new one. See service_architecture.
  - Every inter-service change is contract-first — contracts land in coinpela-platform before either producer or consumer implements. See contracts_policy.
  - Every milestone leaves behind runnable environments, documentation, and handoff clarity.
  - Demo discipline dominates through M1; usability discipline dominates from M2.
  - Marketplace remains visible in every milestone, but maturity must match the stage (see marketplace_maturity map).
  - Advanced ML, RL, and HFT work stays on a parallel innovation track unless explicitly promoted into scope.
  - The planner translates each milestone into epics, services/modules, interfaces, repos/branches, risks, and test gates.


# ============================================================================
# SERVICE ARCHITECTURE  (multi-repo, multi-service from day one)
# ============================================================================

service_architecture:

  posture: multi_repo_multi_service_from_day_one

  rationale: >
    CoinPela has natural service boundaries from day one: Buddy
    orchestration, strategy/backtesting, execution, marketplace,
    identity, and UI. A central product requirement is that users
    adjust their trading bots at runtime by talking to Buddy — which
    means strong, explicit control-plane contracts between Buddy and
    the services it drives. Multi-repo, multi-service enforces those
    contracts from the first commit and lets different agents own
    different repos without merge contention. The cost is operational
    complexity (deployment coordination, integration testing, local
    dev loop), and the recipe mitigates that explicitly via
    local_dev_policy and m1_microservices_guardrails.

  default_for_new_features: "create new service if domain boundary is clear; justify in writing before adding to an existing service"

  service_creation_rule: >
    product_architect_tech_lead approves every new service before
    implementation begins. New services require: clear domain
    ownership, named contracts with at least one other service, a
    Dockerfile, a CI pipeline, a healthcheck, a mock mode, and an
    entry in the docker-compose stack in coinpela-platform.

  service_merging_rule: >
    Merging two existing services into one repo requires written
    justification (e.g., "these two services always deploy together
    and never have independent owners"). Architect-approved, logged
    in the affected repo READMEs.


# ============================================================================
# CONTRACTS POLICY
# ============================================================================
# In multi-service architecture, contracts ARE the architecture. This
# section defines how contracts are specified, versioned, changed, and
# approved. The platform repo holds canonical contracts; every other
# repo imports them as a versioned dependency.
# ============================================================================

contracts_policy:

  contract_home: "coinpela-platform/contracts/"

  format_choice:
    rule: architect_decides_per_service_with_written_criteria
    defaults:
      external_facing: OpenAPI_3_REST
      internal_between_services: gRPC_Protobuf
    decision_criteria:
      prefer_rest_openapi_when:
        - service is consumed by coinpela-frontend
        - service is consumed by a future third-party creator API
        - request/response is not latency-critical
        - human-readable curl debugging is valuable
      prefer_grpc_protobuf_when:
        - service is purely internal
        - latency matters (e.g., order placement path)
        - strict typing prevents drift
        - streaming is needed
    documentation_requirement: >
      Every service's contract choice is documented in its README
      with a one-paragraph rationale tied to the criteria above.
      Architect signs off.

  contract_first_development:
    rule: "contract is defined and merged into coinpela-platform BEFORE either the producer or consumer service implements it"
    workflow:
      - writer_agent_drafts_contract_PR_in_coinpela_platform
      - product_architect_tech_lead_reviews_and_approves_or_suggests_changes
      - qa_reviewer_release_gatekeeper_checks_contract_test_coverage
      - contract_PR_merges_to_coinpela_platform
      - consumer_and_producer_services_import_new_contract_version_and_implement

  versioning:
    scheme: semver_per_contract
    path: "contracts/{service}/v{major}/*.{openapi.yaml|proto}"
    breaking_change_rule: "bump major version, keep previous major available for at least one milestone"
    non_breaking_change_rule: "bump minor version in place"

  breaking_change_process:
    requires: product_architect_tech_lead_signoff
    also_requires:
      - migration_plan_documented
      - consumer_services_have_open_tickets_to_upgrade
      - deprecation_window_set (>= one milestone)
      - entry_in_coinpela_platform_CHANGELOG
    forbidden_during_m1_feature_freeze: true

  drift_detection:
    method: automated_contract_check_in_every_service_ci
    fail_conditions:
      - consumer implements a version not in coinpela-platform
      - producer removes a field still in the current major contract
      - producer changes field semantics without version bump
    watched_by: cost_and_health_monitor_plus_qa_reviewer_release_gatekeeper

  buddy_control_plane:
    status: first_class_m1_deliverable
    description: >
      Users adjust live bots by talking to Buddy. This requires
      runtime control-plane contracts from coinpela-buddy into
      coinpela-execution and coinpela-strategy. Not configuration
      files, not batch jobs — live APIs Buddy calls to translate
      conversational intent into running-bot changes.
    required_operations:
      buddy_to_execution:
        - pause_bot
        - resume_bot
        - stop_bot
        - emergency_stop_all_for_user
        - adjust_risk_limits (position size, daily loss cap, stop-loss)
        - adjust_execution_parameters (slippage tolerance, order type)
      buddy_to_strategy:
        - reconfigure_template_parameters
        - trigger_backtest_with_new_parameters
        - return_evidence_layer_for_user_confirmation
        - switch_template (with user confirmation)
    format: "architect chooses, but given latency and internal-only nature, gRPC/Protobuf is the default recommendation"
    user_confirmation_rule: >
      Any control-plane change that would place a live order requires
      explicit user confirmation in the UI before execution accepts
      the change. Buddy surfaces the intended change + evidence +
      confirm button; execution rejects any unconfirmed change.


# ============================================================================
# LOCAL DEV POLICY
# ============================================================================
# Multi-service only works if agents can bring the whole stack up
# locally in one command. Otherwise integration bugs are found during
# rehearsals, and rehearsals fail.
# ============================================================================

local_dev_policy:

  one_command_stack:
    home: coinpela-platform
    command: "docker-compose up"
    brings_up: "all M1 services + their dependencies (Postgres, Redis, mock Coinbase)"
    healthcheck_required_per_service: true
    must_be_able_to_run_on: [macOS, Linux]
    target_cold_start_time_seconds: 60

  mock_modes:
    rule: "every service exposes a mock mode activated by env var"
    purpose: >
      Agents developing service A should not need services B, C, D
      running to test A. Mock modes return realistic stubbed responses
      per the service's contract. This also doubles as the fallback
      path for demo-time service failures.
    required_for_m1: [coinpela-buddy, coinpela-execution, coinpela-strategy, coinpela-marketplace, coinpela-identity]
    coinbase_mock: "paper-trading mode with synthetic fills — also the demo fallback"

  integration_testing:
    owner: qa_reviewer_release_gatekeeper
    lives_in: coinpela-platform
    runs_in: per_repo_CI_against_docker_compose_stack
    required_from_day_one_of_m1: true
    covers:
      - m1_demo_arc_flow_end_to_end
      - every_contract_between_services
      - emergency_stop_latency_under_1s
      - order_placement_to_dashboard_latency_under_3s

  contracts_as_dependency:
    mechanism: "each service imports contracts from coinpela-platform at a pinned version"
    upgrade_trigger: "contract PR merges to coinpela-platform -> consumer tickets auto-created by program_manager_orchestrator"


# ============================================================================
# M1 MICROSERVICES GUARDRAILS
# ============================================================================
# Microservices add deployment coordination, integration complexity, and
# cross-repo contract risk. For a rehearsed investor demo, these risks
# can break the demo. This section is honest about them and defines
# concrete mitigations the team must meet before M1 is shippable.
# ============================================================================

m1_microservices_guardrails:

  risks_acknowledged:
    - "deployment_coordination: 6-8 services must all be healthy for demo arc to work"
    - "local_dev_loop: agents need full stack locally or cannot test end-to-end"
    - "contract_drift: service A changes API, service B unaware, demo breaks in rehearsal"
    - "cross_repo_visibility: progress is harder to see without board aggregation"

  required_mitigations:
    - one_command_local_stack_working_from_week_one: "docker-compose up brings everything up, healthchecks pass, cold start under 60s"
    - integration_tests_automated_from_day_one: "every contract between services has an automated test in coinpela-platform CI"
    - mock_mode_per_service: "every M1 service has a mock mode; agents testing service A do not need B/C/D running"
    - service_down_fallback_for_every_demo_dependency: "if any single service fails during the investor demo, there is a pre-rehearsed fallback (paper trading mode, seeded data restore, offline dashboard replay)"
    - contract_first_workflow_enforced: "no service implements a contract not yet merged in coinpela-platform; CI blocks it"
    - cross_repo_github_project_board: "progress_tracking board spans all M1 repos; Repo is a filterable field"
    - per_service_dockerfile_and_healthcheck: "every repo has both; no exceptions"
    - deployment_readiness_rehearsal: "full stack brought up in staging environment from cold start and exercised end-to-end before any investor rehearsal counts toward m1_feature_freeze"

  demo_dependency_rule: >
    No service goes into the rehearsed investor demo path without a
    working fallback for when it is down. The fallback is validated
    in at least one rehearsal. If a service has no validated
    fallback, it is not in the demo.

  no_service_in_demo_without: [mock_mode, healthcheck, dockerfile, ci_green_on_main, integration_test_passing, fallback_rehearsed]


# ============================================================================
# SERVICE DECOMPOSITION GUIDANCE
# ============================================================================

service_decomposition_guidance:
  principle: >
    Multi-service, multi-repo is the default. Prefer a new service
    when a domain boundary is clear, when a different agent naturally
    owns it, when independent deployment matters, or when security or
    scaling concerns justify isolation. Prefer to fold work into an
    existing service when no domain boundary is clear and the work is
    small.
  likely_domains_now_mapped_to_repos:
    identity_onboarding_and_account_connection: coinpela-identity
    ai_buddy_orchestration: coinpela-buddy
    ai_buddy_profile_and_tuning: coinpela-buddy
    strategy_definition_and_template_engine: coinpela-strategy
    backtesting_and_simulation: coinpela-strategy
    execution_and_broker_exchange_integrations: coinpela-execution
    portfolio_analytics_and_reporting: "coinpela-strategy (analytics) + coinpela-frontend (display)"
    marketplace_and_listings: coinpela-marketplace
    notifications_and_alerting: "architect decision — coinpela-notifications (split) or folded into coinpela-execution/coinpela-platform"
    shared_frontend_application: coinpela-frontend
  requirements:
    - Every repo has a clear owner role from desired_roles.
    - Every repo has a README describing purpose, owned domains, exposed contracts, consumed contracts, and deployment notes.
    - New repos require rationale, boundaries, contract definitions committed to coinpela-platform, deployment notes, Dockerfile, healthcheck, mock mode, and docker-compose entry before any business logic is merged.
    - Architect approves every new repo before it is created.


# ============================================================================
# SHARED ENGINEERING RULES
# ============================================================================

shared_engineering_rules:
  - All code changes occur through git branches and pull requests.
  - Implementation, review, and release decisions use repository history as the source of truth.
  - No agent approves its own pull request.
  - Reviewer and QA validate architecture alignment, tests, CI, milestone conformance, and release risk before merge.
  - DevOps controls release flow, protected branches, and deployment automation.
  - Planner and architect keep work aligned to the active milestone and product surfaces.
  - Quant work is packaged into product-ready templates or interfaces before being treated as deliverable.
  - Any API, credentials, repository access, deployment, or integration blocker triggers an immediate human-supervisor alert.
  - Every PR cites the ui_surface and/or service module its work touches and the done_criteria it satisfies.


# ============================================================================
# QUANT / ML SCOPE
# ============================================================================

quant_ml_scope:
  ownership:
    owns:
      - strategy_logic
      - signal_design
      - prebuilt_template_definitions
      - feature_generation
      - backtesting_and_simulation_logic
      - evaluation_metrics   # product-quality metrics only, never profitability
      - risk_logic
      - experiment_reporting
      - evidence_generation_for_ai_buddy
    collaborates_on:
      - strategy_packaging_for_marketplace
      - strategy_metadata_for_listing_pages
      - advisory_intelligence_layers
      - user_facing_strategy_explanations
    does_not_own_alone:
      - marketplace_distribution
      - billing_or_subscription_logic
      - final_publication_workflows
  prebuilt_tools_suggestions:
    strategy_templates: [pandas_ta, grid_template, dca_template, ema_crossover_template, rsi_momentum_template, bollinger_mean_reversion_template]
    backtesting: [fast_test_runner, deep_test_runner, parameter_sweep, fee_and_slippage_simulator, benchmark_comparison]
    risk: [position_sizing, stop_loss_take_profit_validator, drawdown, volatility, sharpe_ratio, beta, correlation]
    data: [ohlcv_loader, historical_market_data_fetcher, feature_builder, portfolio_history_normalizer]
    packaging: [strategy_to_config_compiler, strategy_metadata_generator, performance_card_generator, listing_summary_generator]
    future: [rag_connector, advisory_sentiment_feature_builder, experiment_tracker]


# ============================================================================
# EVALUATION SUITE  (product-quality only; profitability is NOT measured)
# ============================================================================

evaluation_suite:

  philosophy: >
    We do NOT evaluate the team on trading profitability or return rate.
    Strategy results depend on the user's own algorithms, parameters,
    and AI-Buddy tuning. Being profitable is out of scope of this work.
    The product's job is to let users express, tune, and specialize
    their AI Buddy, and to run the resulting bots correctly and
    reliably. Evaluation measures product correctness, user-tuning
    capability, Buddy responsiveness, flow completeness, demo
    reliability, and (from M2) security posture.

  buddy_tuning_capability:
    description: Can the user specialize their AI Buddy's behavior?
    checks:
      - "buddy_accepts_a_user_profile (system prompt, presets, or structured preferences)"
      - buddy_persists_user_preferences_across_sessions
      - buddy_can_be_steered_toward_conservative_or_aggressive_framing
      - "buddy_respects_user_defined_hard_limits (max position size, forbidden assets, etc.)"
      - user_can_see_and_edit_the_buddy_profile_from_the_UI

  flow_completeness:
    description: End-to-end product flows must complete without manual intervention.
    m1_required_flows:
      - plain_language_prompt -> strategy_proposal -> backtest -> explicit_confirm -> live_order_on_coinbase -> dashboard_shows_fill
      - browse_marketplace -> open_detail -> subscribe
      - list_my_strategy -> appears_in_marketplace_seeded_view
      - open_buddy_profile -> change_a_hard_limit -> buddy_behavior_reflects_change
      - press_emergency_stop -> all_bots_halt_within_1s -> audit_log_entry_written
    m2_required_flows:
      - signup -> onboarding -> exchange_connect -> template_choose -> deploy -> monitor
      - create_custom_strategy_via_buddy -> save_to_library -> deploy_from_library
      - all_m1_flows_still_pass

  buddy_correctness:
    description: AI Buddy translates plain language to a valid, bounded config.
    checks:
      - "canonical_prompt_bench (~20 prompts, each with a valid expected config shape)"
      - "ambiguous_prompt_bench (Buddy asks clarifying questions rather than guessing)"
      - "unsafe_prompt_bench (Buddy refuses or requires explicit confirmation for high-risk intents)"

  reliability:
    m1_demo_arc:
      three_consecutive_rehearsals_must_pass: true
      p95_ui_response_time_ms: 800
      p95_order_placement_to_dashboard_ms: 3000
    m2_pilot:
      uptime_target_percent: 99.0
      critical_path_error_budget_percent: 1.0

  security_evaluation:
    m1: basic_secret_scan_plus_trade_only_api_scope_assertion_plus_emergency_stop_test
    m2_plus: full_security_posture_checks_per_security_posture_map

  explicitly_not_measured:
    - trading_profit_or_loss
    - strategy_return_rate
    - sharpe_as_acceptance_criterion
    - market_outperformance


# ============================================================================
# TOOL REGISTRY POLICY
# ============================================================================

tool_policy:
  tools_are_suggestions: true
  tool_finalization_authority: team_maker
  tool_finalization_process: >
    team_maker reads each role's responsibility set and suggested tool
    list, then designs concrete tool signatures, return types, and
    implementations. Where a suggested tool maps cleanly to an existing
    library (e.g. pr_creator -> PyGithub), team_maker uses the library.
    Where no clean mapping exists, team_maker generates a stub with a
    clear TODO and registers it so agents can call it by name.
  tool_registry_location: "./generated_teams/coinpela_autonomous_team/tools_registry.yaml"
  agents_must_not:
    - call tools that are not in the final registry
    - invent new tool names at runtime
    - assume a tool exists based on its name alone

# ============================================================================
# NOTIFICATION CHANNELS
# ============================================================================
# Out-of-band channels the team uses to reach the human supervisor when
# board comments and webhooks alone are not enough (halt events, M1
# rehearsal recaps, digest posts, PR-cycle escalations).
# ============================================================================

notification_channels:

  telegram:
    enabled: true
    transport: telegram_bot_api
    credentials:
      bot_token_env: TELEGRAM_BOT_TOKEN
      chat_id_env: TELEGRAM_CHAT_ID
    credentials_source: shell_environment   # exported from ~/.bashrc
    delivery_guarantees:
      retry_on_5xx: true
      max_retries: 3
      fallback_channel: webhook_plus_email   # if Telegram API is down
    message_format: markdown_v2
    rate_limit_per_minute: 20
    team_maker_responsibilities:
      - Generate a `telegram_sender` tool that reads TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID from the environment at runtime (never hardcoded, never logged).
      - Register the tool in tools_registry.yaml and bind it to every role listed in routing below.
      - Fail team spawn with a clear error if either env var is missing when notification_channels.telegram.enabled is true.
    routing:
      send_to_telegram:
        - cost_and_health_monitor.kill_switch_fired
        - cost_and_health_monitor.secret_leak_heuristic_tripped
        - program_manager_orchestrator.daily_digest
        - program_manager_orchestrator.m1_rehearsal_recap
        - program_manager_orchestrator.weekly_milestone_summary
        - product_architect_tech_lead.m1_feature_freeze_declared
        - qa_reviewer_release_gatekeeper.third_rejection_reached
      do_not_send_to_telegram:
        - routine_card_status_transitions
        - per_pr_review_comments
        - advisor_agent_verdicts

# ============================================================================
# DESIRED ROLES  (13 agents, each with milestone_responsibilities)
# ============================================================================

desired_roles:

  # ========================================================================
  # COORDINATION
  # ========================================================================

  - name: program_manager_orchestrator
    llm: gpt_55_pro
    description: >
      Central coordination agent. Decomposes founder commands into
      milestone-aligned epics, tasks, and tickets. Maintains the
      priority-policy-ranked backlog. Assigns work to the right role.
      Tracks blockers. Runs the rehearsal schedule for M1. Produces
      concise human-supervisor reports. Explicitly maps every piece of
      work to a ui_surface and/or service module, a git branch, test
      gates, done_criteria, and the milestone acceptance criterion it
      serves. Co-holder (with product_architect_tech_lead) of
      force_ship_authority under definition_of_done. Owns digest posting
      (daily progress, M1 rehearsal recap, weekly milestone summary,
      investor-ready signal) per digest_cadence; creates every ticket's
      GitHub Project card with initial field values per board_update_protocol.
      Aggregates all per-agent docs from workspace/docs/ and pushes them to
      coinpela-platform/docs/ via git_account after each task phase and at
      M1 freeze. Writes its own planning and digest docs to
      workspace/docs/program_manager_orchestrator/.
    capabilities:
      - workflow_coordination
      - milestone_tracking
      - dependency_management
      - reporting
      - task_decomposition
      - blocker_escalation
      - human_supervisor_alerting
      - release_readiness_tracking
      - priority_scoring
      - force_ship_coholder
      - project_board_card_creation_and_field_population
      - digest_posting
    milestone_responsibilities:
      m1:
        primary_focus: "Ship the investor demo. Protect the demo arc above all else."
        deliverables:
          - fully-decomposed backlog with priority_policy scores for every M1 ticket
          - done_criteria declared for every M1 ticket before work starts
          - every M1 ticket has a matching Project board card with Milestone, PriorityScore, M1CriticalPath, Owner, DoneCriteria, DemoArc, RehearsalGateItem set at creation
          - daily progress digest posted per digest_cadence while M1 is open
          - M1 rehearsal recap posted after every rehearsal run
          - rehearsal coordination once the system is runnable end-to-end
          - M1 freeze-trigger monitoring and declaration when criteria are met
          - "demo talk-track runbook (what the presenter does, says, and shows)"
          - fallback demo readiness verification
          - investor_ready_signal posted when M1 ship conditions are all met
        non_negotiables:
          - no non-M1 work is scheduled while M1 critical-path work is open
          - every demo arc ticket has explicit done_criteria and rehearsal validation
          - turn-budget soft/hard limits are tracked per ticket
          - every ticket has a card; no untracked work
      m2:
        primary_focus: "Transition from demo mode to product-coherence mode."
        deliverables:
          - revised backlog aligned to M2 acceptance_criteria
          - onboarding flow integration plan
          - internal marketplace operationalization plan
          - pilot-readiness tracking
          - production-security enforcement tracking at PR level
        non_negotiables:
          - M1 demo arc regressions remain P0 during pilot
          - security posture compliance is a gate on every merge
      m3:
        primary_focus: "Coordinate multi-asset expansion without destabilizing crypto."
        deliverables:
          - cross-asset integration sequencing plan
          - stocks broker onboarding coordination
          - advisory layer rollout plan
          - cross-asset testing coordination
        non_negotiables:
          - stocks work does not regress crypto flows
          - advisory work never drifts toward copy-trading
      m4:
        primary_focus: "Coordinate commercial rollout."
        deliverables:
          - creator publishing rollout plan
          - billing and subscription rollout plan
          - moderation pipeline coordination
          - early commercial metric tracking
        non_negotiables:
          - no external creator launch before moderation pipeline passes review
          - no billing enablement without a completed pen-test
    suggested_tools:
      - task_planner
      - report_writer
      - handoff_manager
      - roadmap_mapper
      - human_supervisor_alert_tool
      - git_account
      - branch_plan_generator
      - milestone_checklist_builder
      - priority_scorer
      - rehearsal_coordinator
      - force_ship_tool
      - telegram_sender
      - doc_writer
      - project_board_updater
    reports_to: human_supervisor

  - name: product_architect_tech_lead
    llm: claude_opus_47
    description: >
      Owns the overall technical architecture and staged delivery plan.
      Converts founder commands into milestone-aligned implementation
      strategy. Defines system boundaries, approves interface contracts,
      decides when work belongs in a module versus a separate service,
      resolves tradeoffs, protects the product story, and gives final
