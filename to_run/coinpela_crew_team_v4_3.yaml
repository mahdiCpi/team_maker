# ============================================================================
# EXECUTION MODE
# ============================================================================

execution_mode:
  style: continuous_delivery
  milestone_priority_order: [m1, m2, m3, m4]
  m1_is_highest_priority: true
  m1_reason: >
    Milestone 1 is the investor demo. It is the moment CoinPela stops
    being a deck and starts being a product. Investor conviction depends
    on a live plain-language-to-real-order flow working reliably. Until
    M1 has shipped and been rehearsed, every other milestone's work is
    secondary. Agents pull forward M1-critical tasks over non-M1 work
    at every decision point.
  principle: >
    The team does not wait for calendar dates. Milestones define
    sequencing, scope boundaries, and quality bars only. Agents move to
    the next ready task immediately after completing the current one.
    Parallel execution across roles is expected whenever interfaces are
    defined.
  rules:
    - Work on the highest-priority unblocked task at all times (see priority_policy).
    - While M1 is open, any ticket scoring max on critical_path_to_m1_demo outranks everything else.
    - Pull forward downstream work whenever dependencies are satisfied.
    - Use milestones as readiness gates, not as reasons to pause.
    - Prefer parallel execution across roles when interfaces are defined.
    - Escalate blockers immediately; do not wait for later review cycles.
    - Freeze M1 scope as soon as the demo arc passes three rehearsed runs (see m1_feature_freeze).
    - Work terminates when definition_of_done is met. Taste findings are not grounds to keep iterating.


# ============================================================================
# PRIORITY POLICY  (machine-enforceable task scoring)
# ============================================================================
# "M1 is highest priority" is not enough. Agents under pressure need a
# numeric rule they can apply to pick the next task. Every open ticket
# is scored on the rubric below; the orchestrator assigns the highest-
# scored unblocked task next.
# ============================================================================

priority_policy:

  scoring_rubric:
    dimensions:

      critical_path_to_m1_demo:
        weight: 5
        scale:
          "5": "ticket is directly on the M1 demo arc (plain-language -> bot -> live fill -> dashboard -> marketplace visibility)"
          "4": "ticket unblocks an M1 demo arc ticket"
          "3": "ticket is in M1 but not on the critical demo arc"
          "2": "ticket is M1 guardrails or polish"
          "1": "ticket is M1-adjacent (setup, infra)"
          "0": "ticket is not in M1 scope"

      investor_demo_visibility:
        weight: 4
        scale:
          "5": "visible in the rehearsed demo video; investors see it live"
          "3": "visible if investors click around during Q&A"
          "1": "invisible to investors but required for the live system"
          "0": "invisible in every scenario"

      dependency_unlock_value:
        weight: 3
        scale:
          "5": "unblocks 3+ other agents or tickets"
          "3": "unblocks 1-2 other agents or tickets"
          "1": "unblocks nothing currently queued"

      security_risk_reduction:
        weight_m1: 3
        weight_m2_plus: 5
        scale:
          "5": "closes an active exploitable vulnerability OR meets a required security_posture minimum for the current milestone"
          "3": "hardens a known exposure"
          "1": "opportunistic security improvement"
          "0": "no security dimension"

      milestone_fit:
        weight: 2
        scale:
          "5": "directly implements a current-milestone acceptance_criterion"
          "3": "indirectly supports the current milestone"
          "0": "out of current milestone scope"

  computation:
    formula: "sum(dimension_score_i * applicable_weight_i)"
    tiebreaker_order:
      - "critical_path_to_m1_demo (higher wins)"
      - "dependency_unlock_value (higher wins)"
      - "ticket_age (older wins)"

  m1_override: >
    While M1 is open, any ticket scoring 5 on critical_path_to_m1_demo
    automatically outranks any ticket that does not, regardless of total
    score. No non-M1-critical-path work is scheduled ahead of M1
    critical-path work while M1 is open.

  orchestrator_instruction: >
    program_manager_orchestrator MUST score every new ticket on these
    dimensions at creation time, and re-score when milestone boundaries
    shift. Agents pull work from the highest-scored unblocked ticket in
    their queue.


# ============================================================================
# PRODUCT CONTEXT  (expanded narrative)
# ============================================================================

product_context:

  company_name: CoinPela
  one_sentence_pitch: >
    Tell your AI what you want, watch it trade, and let others discover,
    subscribe to, and eventually monetize strategies that work.

  product_narrative: >
    CoinPela is a non-custodial, AI-powered trading co-pilot that turns
    plain-language trading intent into real, running, bounded strategies.
    The core loop begins when a user describes a goal in plain English
    (or voice) to their AI Buddy. Buddy clarifies ambiguity, proposes a
    structured strategy with explicit risk bounds, and shows evidence:
    a quick backtest, recent-history behavior, expected drawdown and
    volatility. The user confirms explicitly before anything goes live.
    The bot then runs against the user's own exchange account; CoinPela
    never takes custody of funds. The dashboard shows fills, positions,
    performance, and risk in real time, and the user can tune their
    Buddy (personality, framing, hard limits) so it becomes more
    specialized to their style over time.
    Layered on top of the core loop is a marketplace. A user who builds
    something they trust can list it; a user who wants to trade without
    designing can browse, evaluate, and subscribe. Across the staged
    roadmap the marketplace progresses from seeded-demo (M1) to internal
    CoinPela-managed (M2) to limited external creator workflow (M3) to
    full self-serve creator publishing with monetization (M4).
    The third layer is multi-asset. Today's scope is crypto via Coinbase
    Advanced Trade. Stocks arrive in M3. The long arc is one AI operating
    layer across multiple asset classes, with consistent tuning,
    consistent risk framing, and consistent marketplace economics.
    Why this matters: retail traders either over-trade emotionally or
    never trade at all because existing tooling assumes fluency they do
    not have, and quant teams build algorithms the rest of the world
    cannot use. CoinPela collapses that gap. The barrier to a real
    automated strategy drops from "learn Python and a trading framework"
    to "tell your Buddy what you want." And because CoinPela is
    non-custodial, the user's funds stay in their own exchange account
    at all times.

  core_visions:
    - name: simple_to_use
      meaning: >
        A user should be able to describe goals in plain language and
        create a sophisticated automated trading or investment bot
        without writing any code.
    - name: marketplace
      meaning: >
        CoinPela is a platform where strategies can be discovered,
        subscribed to, listed, evaluated, and eventually monetized —
        not just a trading tool.
    - name: multi_asset
      meaning: >
        CoinPela evolves from crypto-first into one AI operating layer
        across multiple asset classes, beginning with stocks after the
        crypto foundation is stable.

  core_product_behavior:
    - User speaks or types a goal in plain language.
    - AI Buddy clarifies the request and proposes a bounded strategy structure.
    - The system presents evidence (quick backtest, recent behavior, risk profile) before live deployment.
    - The user explicitly confirms before the bot goes live.
    - The bot executes on the connected venue; the dashboard shows status, fills, performance, and risk.
    - The user can store, monitor, and eventually list the strategy in the marketplace.
    - The user can tune or specialize their AI Buddy (personality, framing, hard limits).

  user_archetypes:
    - name: curious_retail_trader
      description: >
        Has an exchange account and trading ideas but no engineering
        skills. Wants automation without learning Python. Primary AI
        Buddy user and core archetype from M1 onward. Investor demo
        speaks to this persona.
    - name: strategy_creator
      description: >
        Designs or refines strategies well enough to want others to use
        them. Wants analytics on their creations and eventually
        monetization. Relevant from M2 (internal) and central in M4
        (external publishing).
    - name: strategy_subscriber
      description: >
        Wants good strategies running on their own account but does not
        want to design them. Core marketplace consumer; relevant from M2.

  differentiators:
    - Non-custodial by design; user funds never leave their exchange account.
    - AI Buddy is tunable and persistent; each user's Buddy becomes more specialized over time.
    - Evidence-before-commit UX; no live trade happens without explicit confirmation shown alongside a backtest.
    - Marketplace is integrated from day one, not bolted on later.
    - Multi-asset future is architected in from M1 (asset-agnostic data model) even though M1 ships crypto-only.

  non_negotiables:
    - Non-custodial. CoinPela never holds user funds.
    - Explicit user confirmation is required before any live trade.
    - Exchange API credentials use trade-only scope; never withdraw scope.
    - AI Buddy never issues an order without a confirmed, evidence-backed plan.
    - No copy-trading drift; advisory context informs but does not execute.


