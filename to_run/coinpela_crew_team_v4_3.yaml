          - subscription management UX (upgrade/downgrade/cancel)
          - subscriber-to-creator relationship UX
    suggested_tools:
      - spec_writer
      - repo_reader
      - task_planner
      - analytics_reader

  - name: marketplace_creator_strategist
    llm: gemini_31_pro
    description: >
      Owns the marketplace from the creator / publisher side. Defines
      creator onboarding, listing-submission flow, creator dashboards,
      creator-visible performance reporting, moderation / review
      pipeline, and eventual monetization / payouts surface.
      Intentionally runs on a different provider than
      marketplace_ux_strategist so the two perspectives do not converge
      prematurely.
    capabilities:
      - creator_workflow_design
      - listing_submission_flow
      - creator_dashboard_design
      - moderation_pipeline_design
      - monetization_readiness
    milestone_responsibilities:
      m1:
        primary_focus: "Seeded creator listing flow (stub) for the demo."
        deliverables:
          - listing submission UX spec (seeded)
          - listing writes real state even if creator pipeline is stubbed
      m2:
        primary_focus: "Internal creator dashboard."
        deliverables:
          - internal creator dashboard UX
          - creator-visible performance reporting UX
          - internal moderation checklist
      m3:
        primary_focus: "Limited external creator workflow."
        deliverables:
          - limited creator form or API UX
          - automated moderation checks spec
          - creator onboarding flow
      m4:
        primary_focus: "Full self-serve creator publishing."
        deliverables:
          - full self-serve publishing UX
          - moderation pipeline UX
          - payouts UX
          - creator analytics dashboards
    suggested_tools:
      - spec_writer
      - repo_reader
      - task_planner
      - analytics_reader

  - name: marketplace_lead
    llm: claude_sonnet_46
    description: >
      Makes the FINAL CALL on whether the marketplace portion of the
      current milestone is ready to move forward, based on the
      marketplace_maturity map and the deliverables from
      marketplace_ux_strategist and marketplace_creator_strategist.
      Runs on a third, different provider (OpenAI) so its judgment does
      not mirror either perspective agent (Anthropic and Google). Has
      authority to send marketplace work back for revision or to signal
      marketplace-ready to product_architect_tech_lead.
    capabilities:
      - cross_perspective_synthesis
      - milestone_conformance_decision
      - marketplace_release_gate
    milestone_responsibilities:
      m1:
        gate_question: "Is the marketplace good enough to support the investor story?"
        required_checks:
          - seeded listings browse / detail / subscribe / list flows work end to end
          - marketplace surfaces are visible in the demo arc
          - nothing in the marketplace UX undermines the rest of the demo
      m2:
        gate_question: "Is the internal marketplace operational and coherent?"
        required_checks:
          - real performance pages render with real data
          - subscription state is real and persisted
          - internal curation process is documented and functional
          - CoinPela-managed listings cover the template catalog
      m3:
        gate_question: "Is creator-readiness good enough for limited external participation?"
        required_checks:
          - limited creator workflow is documented and usable
          - moderation automation catches known bad-actor patterns
          - creator dashboards render useful performance data
      m4:
        gate_question: "Is monetized publishing trustworthy enough for friendly external users?"
        required_checks:
          - self-serve publishing + moderation pipeline passes review
          - payouts work end to end
          - subscription management works end to end
          - fraud monitoring is in place
    suggested_tools:
      - spec_reader
      - marketplace_readiness_checklist_tool
      - decision_writer
    has_veto_on: marketplace_milestone_completion

  # ========================================================================
  # SAFETY / OPS
  # ========================================================================

  - name: cost_and_health_monitor
    llm: claude_haiku_45
    description: >
      Continuously watches token spend per role, error rates per
      provider, CI failure rates, agent retry loops, rate-limit hits,
      per-ticket turn-budget consumption, and security heuristics
      (secret-leak entropy scans, credential mishandling patterns,
      unsafe exchange permission expansion, non-custodial violation,
      copy-trading drift). Also watches the GitHub Project board itself
      for drift (cards stuck in a status beyond soft turn-budget, PRs
      opened without a matching card, cards without an owner, automation
      failures) per board_update_protocol.drift_monitoring. Maintains
      per-metric thresholds (tunable), issues alerts, and has authority
      to trigger the team-wide kill switch: stop all in-flight work,
      block new PRs, freeze merges, notify human supervisor via webhook
      + email. Cheap, fast, rule-following — Haiku is the canonical fit.
      v4 extends this agent to cover security triggers as well, avoiding
      the need for a separate security guardian role; v4.1 also makes it
      responsible for board-drift detection so we never need a reporter
      agent either.
    capabilities:
      - metric_watching
      - threshold_management
      - secret_leak_heuristics
      - credential_mishandling_detection
      - exchange_permission_expansion_detection
      - non_custodial_violation_detection
      - copy_trading_drift_detection
      - rate_limit_tracking
      - turn_budget_tracking
      - board_drift_monitoring
      - alerting
      - kill_switch_authority
    milestone_responsibilities:
      m1:
        primary_focus: "Watch tokens, errors, board drift, and the M1 operational_minimums security floor."
        deliverables:
          - threshold tuning for M1 token spend and error rates
          - secret-scan triggers in CI reviewed and active
          - trade-only API scope assertion active
          - emergency stop plumbing verified (1s kill)
          - board-drift detection live once platform_devops_engineer completes the Project board bootstrap
          - TurnBudgetUsed field updated continuously on every active card
        non_negotiables:
          - PRs opened without a matching card are flagged within one monitor cycle
          - cards stuck in InProgress beyond turn-budget soft-limit are alerted
          - kill-switch halts also tag every InProgress card as Blocked with halt_reason
      m2:
        primary_focus: "Extend thresholds to cover production security posture."
        deliverables:
          - tightened thresholds for pilot traffic
          - security heuristic coverage matches m2 security_posture map
          - per-user credential envelope encryption verified
      m3:
        primary_focus: "Cover cross-asset and advisory surfaces."
        deliverables:
          - copy-trading drift heuristic active on all advisory surfaces
          - cross-asset credential handling verified
      m4:
        primary_focus: "Commercial hardening coverage."
        deliverables:
          - billing fraud heuristics active
          - moderation pipeline health monitored
          - payouts correctness monitored
    suggested_tools:
      - metric_reader
      - threshold_tuner
      - webhook_sender
      - email_sender
      - team_halt_tool
      - diff_entropy_scanner
      - credential_pattern_scanner
      - non_custodial_violation_detector
      - copy_trading_drift_detector
      - turn_budget_tracker
      - project_board_reader
      - board_drift_detector
      - card_field_updater


# ============================================================================
# DESIRED TASKS
# ============================================================================
# RESUMPTION PROTOCOL — READ BEFORE STARTING ANY CONTINUATION RUN
# ============================================================================
#
# Agents have NO memory between runs. Every new crew.kickoff() starts fresh.
# The PM orchestrator does not know what was built in previous sessions.
#
# WHAT HAPPENS IF YOU RE-RUN THE FULL PIPELINE:
#   - project_setup: re-creates project board (harmless, wasteful)
#   - multi_repo_bootstrap: tries to create repos that exist (wastes iterations)
#   - architecture_and_contracts: OVERWRITES existing ADRs
#   - quant_strategy_m1: OVERWRITES working strategy engine
#   - backend_implementation: OVERWRITES working services
#   - frontend_implementation: OVERWRITES working screens
#   Result: destroys working code. NEVER do a blind full re-run.
#
# CORRECT APPROACH FOR CONTINUATION:
#   1. Use run_continuation.sh (not run.sh).
#      run_continuation.sh runs project_state_check FIRST so the PM reads
#      GitHub and knows what already works before dispatching any tasks.
#   2. project_state_check reads every repo on GitHub, classifies each as
#      COMPLETE / NEEDS_WORK / MISSING, and writes continuation_state.md.
#      Only NEEDS_WORK and MISSING components receive new tasks.
#   3. COMPLETE components are explicitly listed as DO_NOT_TOUCH in the
#      PM's state report. No agent may write to a COMPLETE repo.
#
# HOW TO MAKE AGENTS AWARE OF EXISTING WORK:
#   - Every continuation task description MUST begin with:
#     "STEP 1 — READ WHAT EXISTS FIRST. Call git_account get_repo_file
#     to read the current code before writing anything."
#   - Agents compare what they find against their task spec and fill
#     gaps only — they do not rewrite what already works.
#
# RUNNER SCRIPTS:
#   run.sh                  → full fresh build (only for new deployments)
#   run_continuation.sh     → continue from current state (safe for re-runs)
#   run_buddy_sprint.sh     → AI Buddy focused sprint only
#
# ============================================================================

desired_tasks:

  # ── AI BUDDY SPRINT (run via run_buddy_sprint.sh) ──────────────────────────
  # Sequence: buddy_strategy_engine → buddy_backend_core →
  #           buddy_execution_integration → buddy_frontend_wiring

  - name: buddy_strategy_engine
    agent_role: quant_ml_engineer
    description: >-
      Strategy engine: DCAStrategy, GridStrategy, RiskManager, BacktestRunner,
      CoinbaseHistoricalFetcher (DataFetcher interface). Real Coinbase OHLCV.
      All tests pass. pyproject.toml package. feat/buddy-strategy-engine branch.
    dependencies: []

  - name: buddy_backend_core
    agent_role: backend_engineer
    description: >-
      coinpela-buddy FastAPI: IntentParser (GPT-4o), StrategyBuilder,
      BacktestService. POST /chat + POST /backtest. Dockerfile. Tests pass.
      feat/buddy-backend-core branch.
    dependencies: [buddy_strategy_engine]

  - name: buddy_execution_integration
    agent_role: backend_engineer
    description: >-
      Add execution: CoinbaseClient (ExchangeClient ABC), BotEngine,
      AuditLogger, PAPER_TRADING=true. Endpoints: /execute, /bots,
      /emergency-stop, /portfolio. Tests pass. feat/buddy-execution branch.
    dependencies: [buddy_backend_core]

  - name: buddy_frontend_wiring
    agent_role: frontend_engineer
    description: >-
      Wire AIBuddy.tsx to buddy API: BuddyClient interface, real chat,
      strategy proposals, backtest results with equity curve, execute flow,
      bot status, emergency stop. useBuddyChat hook. Tests pass.
      feat/buddy-frontend-wiring branch.
    dependencies: [buddy_execution_integration]

  # ── CONTINUATION SPRINT (run via run_continuation.sh) ─────────────────────
  # Use when resuming work on a partially complete deployment.
  # PM reads GitHub state first — never overwrites working code.

  - name: project_state_check
    agent_role: program_manager_orchestrator
    description: >-
      READ GitHub state before dispatching any work. For each repo, call
      git_account get_repo_file on the main source file. Classify each as
      COMPLETE / NEEDS_WORK / MISSING. Write continuation_state.md.
      Push to coinpela-platform/docs/. Never overwrite COMPLETE code.
    dependencies: []

  - name: identity_completion
    agent_role: backend_engineer
    description: >-
      Read existing coinpela-identity/src/app.py from GitHub FIRST.
      Complete JWT+bcrypt auth, register/login/me. Syntax+pytest+smoke before PR.
      Branch feat/identity-completion then PR then squash merge.
    dependencies: [project_state_check]

  - name: marketplace_completion
    agent_role: backend_engineer
    description: >-
      Read existing coinpela-marketplace/src/app.py from GitHub FIRST.
      Complete 6 seeded brokers, filter params, rent endpoint with guard.
      Syntax+pytest+smoke before PR.
      Branch feat/marketplace-completion then PR then squash merge.
    dependencies: [project_state_check]


  # ── FULL M1 PIPELINE ────────────────────────────────────────────────────────

  # ── PHASE 1: COLLABORATIVE PLANNING (all 3 agents, before any coding) ────
  # PM creates ticket breakdown → Architect validates → QA adds criteria/risks
  # → PM finalizes plan + creates GitHub issues → single source of truth ready.

  - name: project_initial_breakdown
    agent_role: program_manager_orchestrator
    description: >-
      Read ALL context: coding_agents_specs.txt, planning_tips.docx, milestone
      doc, Figma. Produce ticket-level breakdown (smaller than milestones) with
      id, name, agent_role, acceptance_criteria (binary), demo_impact, effort,
      risk_level, dependencies for every M1 deliverable.
      Write project_breakdown_draft.md. Do NOT create GitHub issues yet.
    dependencies: []

  - name: architecture_breakdown_review
    agent_role: product_architect_tech_lead
    description: >-
      Read project_breakdown_draft.md. For each ticket: validate feasibility,
      define component boundaries, specify API contracts (endpoint/schema),
      flag sizing issues (split/merge), list files no agent may touch.
      Write architecture_constraints.md with component map, API contracts,
      sizing corrections, protected files, and top 5 technical risks.
    dependencies: [project_initial_breakdown]

  - name: qa_risk_breakdown_review
    agent_role: qa_reviewer_release_gatekeeper
    description: >-
      Read project_breakdown_draft.md and architecture_constraints.md.
      For each ticket: correct acceptance criteria to binary, flag
      ELEVATED_REVIEW_REQUIRED (credentials/orders/auth touched), label
      DEMO_CRITICAL (which demo step, fallback exists?), add regression risks.
      Write qa_risk_assessment.md with M1 release gate checklist.
    dependencies: [architecture_breakdown_review]

  - name: project_plan_finalization
    agent_role: program_manager_orchestrator
    description: >-
      Consolidate all three planning docs into final_project_plan.md:
      ticket registry with final acceptance_criteria, files_to_change,
      files_not_to_touch, demo_impact, execution order, M1 release gate.
      Create one GitHub issue per ticket in coinpela-platform.
      Push final_project_plan.md — every coding agent reads this before starting.
    dependencies: [qa_risk_breakdown_review]

  - name: project_setup
    description: >
      PLANNING-ONLY task for the program manager. Do NOT write product code.
      (1) Read all files in auxiliary_resources_dir using context_reader —
      start with planning_tips.docx, then the milestone roadmap docx, then
      Design_File.pdf. Extract M1 goals, out-of-scope items, deliverables,
      and done-criteria per agent.
      (2) Write a concise M1_plan.md to
      workspace/docs/program_manager_orchestrator/ covering: goal, out-of-scope,
      one bullet per agent with task + done-criteria, dependency order, top risks.
      (3) Create the GitHub Project board (git_account action=create_project,
      repo=git_account.org_or_user, body={"title":"Coinpela M1"}).
      (4) Create one GitHub issue per task in coinpela-platform with title,
      2-sentence scope, and agent label. Add each issue to the project board
      via add_project_item.
      (5) Push M1_plan.md to coinpela-platform/docs/ via update_repo_file.
      No other agent may begin before this task completes.
    agent_role: program_manager_orchestrator
    dependencies: []

  - name: multi_repo_bootstrap
    description: >
      Create all 7 M1 GitHub repos (coinpela-platform, coinpela-frontend,
      coinpela-buddy, coinpela-execution, coinpela-strategy,
      coinpela-marketplace, coinpela-identity) under the mahdiCpi GitHub account.
      Use EXACT repo names — do NOT prefix them with the username.
      Apply branch protection, required CI jobs (tests/lint/secret_scan/
      contract_check/dockerfile_build), PR template, and required labels.
      Bootstrap the GitHub Projects v2 board per progress_tracking.schema.
      Push an initial Dockerfile, README, and CI stub to each repo.
      Bring up the coinpela-platform docker-compose local-dev stack and
      verify all healthchecks pass. Write a one-page setup runbook to
      workspace/docs/platform_devops_engineer/repo_bootstrap.md.
    agent_role: platform_devops_engineer
    dependencies: []

  - name: architecture_and_contracts
    description: >
      Read ALL context files (Figma PDF all 30 pages, milestone roadmap,
      planning_tips) BEFORE producing output. Call
      context_reader('CoinPela_Milestone_Execution_Plan_Detailed_Team_v2.docx'),
      then context_reader('Design_File.pdf') (all 30 Figma pages), then
      context_reader('planning_tips.docx').
      Approve the final M1 service boundary list. Write one architecture
      decision record per service (contract format, rationale) to
      workspace/docs/product_architect_tech_lead/. Define and commit the
      Buddy control-plane contracts (buddy_execution and buddy_strategy)
      to coinpela-platform via git_account. Approve the Coinbase integration
      contract and the emergency-stop architecture. Produce a one-page M1
      architecture overview. No service may begin implementation before
      its contract is merged.
    agent_role: product_architect_tech_lead
    dependencies: [multi_repo_bootstrap]

  - name: design_system
    description: >
      Read ALL 30 Figma pages via figma_reader or context_reader BEFORE
      producing any output. Call figma_reader (action=pages, action=components,
      action=styles); if Figma credentials are absent, call
      context_reader('Design_File.pdf') and read all 30 pages.
      Produce design_tokens.ts with real Figma color/typography/spacing values,
      screen_inventory.yaml mapping all 30 pages to ui_surfaces/routes, and
      component_specs.md (one section per surface with props, sub-components,
      data fields). Write a one-page summary to
      workspace/docs/design_systems_specialist/. Commit all design artifacts
      to coinpela-frontend via git_account. Block frontend work on any surface
      not yet inventoried.
    agent_role: design_systems_specialist
    dependencies: [multi_repo_bootstrap]

  - name: advisor_precoding_review
    description: >
      PRE-CODING GATE. Read all architecture and design deliverables
      (architecture overview, contracts, design_tokens.ts,
      screen_inventory.yaml, M1 milestone doc). Produce
      workspace/docs/advisor_agent/precoding_advisory.md with these
      sections: Architecture Readiness, Design Readiness, Top 3 Risks,
      Per-Agent Questions (one or two specific questions for each of
      backend_engineer / frontend_engineer / quant_ml_engineer), and
      an Advisory Verdict of GREEN / AMBER / RED. Push to
      coinpela-platform/docs/advisor/precoding_advisory.md via
      git_account. Be specific and direct — no filler.
    agent_role: advisor_agent
    dependencies: [architecture_and_contracts, design_system]

  - name: quant_strategy_m1
    description: >
      Read workspace/docs/advisor_agent/precoding_advisory.md FIRST and
      address any questions directed at quant_ml_engineer before coding.
      Implement Grid and DCA strategy templates (production-ready,
      Coinbase Advanced Trade). Build the fast backtest runner
      (under 5s for demo) and evidence-layer generator. Implement
      basic risk checks (stop-loss, position size, daily loss limit)
      and the strategy-to-config compiler so AI Buddy can parameterise
      templates from plain language. Write risk bounds documentation
      to workspace/docs/quant_ml_engineer/. Commit all strategy code
      to coinpela-strategy via git_account.
    agent_role: quant_ml_engineer
    dependencies: [architecture_and_contracts]

  - name: backend_implementation
    description: >
      Read context first: call
      context_reader('CoinPela_Milestone_Execution_Plan_Detailed_Team_v2.docx')
      and context_reader('Design_File.pdf') BEFORE writing any code.
      Implement these 4 CoinPela-specific backend services (Python/FastAPI):
      coinpela-execution: coinbase_adapter.py (place_order, cancel_order,
        get_portfolio, get_product_candles; paper-trading when PAPER_TRADING=true),
        bot_engine.py (BotManager: start_bot, stop_bot, stop_all_bots),
        audit.py (AuditLog: BOT_START/ORDER_PLACED/ORDER_FILLED/BOT_STOP/
        EMERGENCY_STOP events to TimescaleDB), api.py (POST /bots/{id}/start,
        DELETE /bots/{id}/stop, POST /emergency-stop, GET /portfolio,
        GET /audit-log; all mutating endpoints require user_confirmation=true).
      coinpela-identity: POST /auth/register, POST /auth/login (JWT 24h),
        GET /me. Bcrypt password hashing.
      coinpela-buddy: POST /chat ({user_message, conversation_history[]} ->
        {reply, strategy_proposal?}), intent.py parse_intent().
      coinpela-marketplace: GET /brokers (filter: risk_level, asset_type,
        min_yield), GET /brokers/{id}, POST /brokers/{id}/rent.
        Seed 5 realistic brokers on startup.
      Write tests to workspace/coinpela-*/tests/. Push each service with
      git_account action=commit_and_push. Write API docs to
      workspace/docs/backend_engineer/.
    agent_role: backend_engineer
    dependencies: [architecture_and_contracts, quant_strategy_m1]

  - name: frontend_implementation
    description: >
      MANDATORY STEP 0: Call context_reader('Design_File.pdf') and read ALL 30
      pages before writing any code. Also call figma_reader (action=components,
      action=styles). Read design_tokens.ts and screen_inventory.yaml from the
      design specialist before starting.
      Build EXACTLY these 7 CoinPela screens (React + TypeScript + Tailwind):
      1. OnboardingFlow (p01) — 5-step wizard: PersonalInfo, DocumentUpload,
         SelfieVerification, ProofOfAddress, ConnectAccounts. Route: /onboarding.
      2. Dashboard (p02-07) — TotalPortfolioValue, TodaysPnL, ActiveBrokers
         count, portfolio chart, AI Buddy chat panel sidebar. Route: /.
      3. Portfolio (p09-13) — BrokerAllocationPieChart, RebalanceButton,
         ActiveBrokersSummaryTable (name, strategy, return %). Route: /portfolio.
      4. BrokerMarketplace (p14-15) — broker card grid, filter bar (risk level,
         asset type, strategy tags, min yield), "Showing N brokers". Route: /marketplace.
      5. BrokerDetail (p16-22) — stats, "Rent This Broker" CTA, AI Buddy sidebar.
         Route: /marketplace/:id.
      6. AIBuddy (p23-30) — Chat/SavedPrompts/MySavedStrategies/CreateBroker tabs,
         strategy proposals with Confirm/Cancel. Route: /buddy.
      7. EmergencyStop — global always-visible red button calling /emergency-stop.
      Sidebar nav: Dashboard, AI Buddy, Broker Marketplace, My Brokers, Portfolio.
      Do NOT build a generic app — every component must be CoinPela-named.
      Write concise component usage notes to workspace/docs/frontend_engineer/.
      Commit all code to coinpela-frontend via git_account.
    agent_role: frontend_engineer
    dependencies: [design_system, backend_implementation]

  - name: qa_review_and_release
    description: >
      Review all PRs with severity-tagged findings. Verify project board
      card links. Run the M1 demo rehearsal checklist. Sign off on the
      freeze trigger after three consecutive clean rehearsal runs.
      Write a short test coverage and findings summary to
      workspace/docs/qa_reviewer_release_gatekeeper/. Only blocker
      findings may hold up the investor demo.
    agent_role: qa_reviewer_release_gatekeeper
    dependencies: [backend_implementation, frontend_implementation]

  - name: advisor_prerelease_review
    description: >
      PRE-RELEASE GATE. Read the QA findings, precoding_advisory.md, and
      spot-check 2-3 implementation files. Produce
      workspace/docs/advisor_agent/prerelease_advisory.md covering:
      Pre-Coding Advisory Followup (which risks were addressed/missed),
      QA Findings Assessment (any blockers that must not ship),
      Demo Arc Walkthrough Risk (flag any step that could fail live:
      sign up → browse marketplace → rent broker → view portfolio →
      emergency stop), Remaining Gaps vs M1 Done-Criteria, and a
      Release Verdict of SHIP / SHIP_WITH_CAVEATS / HOLD with named
      reasons. Push to coinpela-platform/docs/advisor/prerelease_advisory.md.
    agent_role: advisor_agent
    dependencies: [qa_review_and_release]

  - name: documentation_push_and_board_update
    description: >
      Read workspace/docs/advisor_agent/prerelease_advisory.md FIRST.
      If the release verdict is HOLD, stop and notify via escalation.
      Otherwise: collect all per-agent docs from workspace/docs/. Push to
      coinpela-platform/docs/ via git_account (one commit per agent,
      one file per topic, no filler). Update all GitHub Project board
      cards with current status, owner, and milestone fields. Post the
      M1 investor-ready digest. If any agent's docs are missing, create
      a placeholder file noting what is outstanding — never skip the push.
    agent_role: program_manager_orchestrator
    dependencies: [advisor_prerelease_review]


# ============================================================================
# EXECUTION PATTERN
# ============================================================================

execution_pattern:
  happy_path: >
    founder_command ->
    program_manager_orchestrator (decompose + priority_policy score +
      declare done_criteria) ->
    product_architect_tech_lead (architecture + interface contracts) ->
    relevant implementation agents in parallel
      (frontend_engineer, backend_engineer, quant_ml_engineer,
       platform_devops_engineer, design_systems_specialist,
       marketplace_* as relevant) ->
    qa_reviewer_release_gatekeeper (review with severity tags) ->
    product_architect_tech_lead (final signoff) ->
    merge + autonomous staging deploy
  pr_rejection_path: >
    qa_reviewer_release_gatekeeper rejects with severity-tagged findings
    -> advisor_agent mediates (different provider than reviewer and
    writer) -> writer iterates (max 3 cycles) -> on third rejection,
    product_architect_tech_lead decides (ship / defer / split).
    Non-blocker findings convert to follow-up tickets automatically.
  marketplace_gate: >
    marketplace_ux_strategist + marketplace_creator_strategist produce
    specs -> marketplace_lead applies the milestone-specific gate
    question -> on pass, signals marketplace-ready to
    product_architect_tech_lead for overall release signoff.
  m1_release_path: >
    orchestrator detects demo arc is runnable end-to-end -> rehearsals
    begin -> on three consecutive clean rehearsals, architect declares
    M1 feature freeze -> stabilization window (polish + fallback
    artifacts only) -> final rehearsal -> M1 SHIPPED. No open
    non-blocker findings can block this step.
  halt_path: >
    cost_and_health_monitor trips any cost/reliability OR security
    trigger -> team-wide halt -> webhook + email + Telegram message
    to human supervisor with trigger reason -> resume only on human signal.
  force_ship_path: >
    program_manager_orchestrator + product_architect_tech_lead both
    agree + no blocker-severity findings remain -> force-merge PR ->
    non-blocker findings convert to follow-up tickets.


# ============================================================================
# METADATA
# ============================================================================

metadata:
  project: coinpela
  owner: founder-office
  recipe_version: "4.2"
  replaces_recipe_version: "4.2"
  providers_used: [anthropic, openai, google]
  providers_explicitly_removed_from_v3: [nous_hermes]
  notes: >
    Live trading, credential changes, protected-branch changes, billing
    enablement, public marketplace publishing, and production
    deployments always require explicit human approval. Replace
    git_account.org_or_user and the *_ENV environment variables before
    first run. Multi-repo bootstrap is a prerequisite for any other M1
    work — platform_devops_engineer owns this.
  changes_from_v4_1:
    - Flipped architecture posture from modular-monolith to multi-repo / multi-service from day one.
    - Replaced git_account with a repo_registry of 7 recommended M1 repos (coinpela-platform / frontend / buddy / execution / strategy / marketplace / identity), an optional 8th (notifications), plus M3/M4 additions (stocks-broker, advisory, billing, moderation). product_architect_tech_lead can merge or split with written rationale.
    - Added service_architecture top-level section with posture, creation/merging rules, and architect authority.
    - Added contracts_policy top-level section. Contract format is architect's choice per service (REST/OpenAPI external, gRPC/Protobuf internal by default). Contracts live in coinpela-platform; contract-first workflow enforced in CI; semver versioning per contract; breaking-change process requires architect signoff and is forbidden during m1_feature_freeze.
    - Added buddy_control_plane as a first-class M1 deliverable with required operations for Buddy-to-execution and Buddy-to-strategy runtime adjustments (pause/resume/stop/adjust_risk_limits/reconfigure_template_parameters/etc.), since users adjust bots by talking to Buddy.
    - Added local_dev_policy requiring a one-command docker-compose stack in coinpela-platform with healthchecks, mock modes per service, and a 60s cold-start target.
    - Added m1_microservices_guardrails acknowledging the risks (deployment coordination, local dev loop, contract drift, cross-repo visibility) and requiring concrete mitigations before M1 ships.
    - Extended m1_feature_freeze.forbidden_post_freeze_work with "no new services" and "no contract changes" (except non-breaking bug-fix versions).
    - Replaced progress_tracking.UiSurfaceOrService with two fields, Repo (single-select with all repo names + cross_repo) and ServiceOrSurface (text). Added "By Repo" and "Cross-Repo Contract Changes" views.
    - Extended board_update_protocol — writers open one ticket per affected repo for cross-repo changes and link them.
    - Extended cost_and_health_monitor drift signals with contract-version-mismatch, service-healthcheck-failing, and docker-compose-stack-fails-to-come-up.
    - Expanded product_architect_tech_lead M1 deliverables with repo boundary approval, per-service contract format decision, contract-first discipline, and Buddy control-plane contracts.
    - Expanded platform_devops_engineer M1 deliverables with multi-repo bootstrap (7-8 repos), per-repo CI with cross-repo contract check, docker-compose local-dev stack, deployment readiness rehearsal, and cross-repo staging environment.
  changes_from_v4_0:
    - Added progress_tracking top-level section defining a GitHub Projects v2 board schema (12 custom fields, 6 views, 8 automations). Single live "where are we?" surface for the founder.
    - Added board_update_protocol specifying which agent updates which card fields, so board upkeep is distributed across the existing team rather than delegated to a new reporter agent.
    - Added digest_cadence formalizing program_manager_orchestrator's daily progress digest, M1 rehearsal recap, weekly milestone summary, and investor_ready_signal.
    - Required project_board_card_link in every PR template; qa_reviewer_release_gatekeeper auto-bounces PRs missing the link (process failure, not blocker-severity).
    - Extended platform_devops_engineer M1 deliverables with one-time GitHub Projects board bootstrap per progress_tracking.schema, and a CI check that rejects PRs missing card links.
    - Extended qa_reviewer_release_gatekeeper to verify card links and update the Severity field on cards.
    - Extended cost_and_health_monitor to watch for board drift (stuck cards, PRs without cards, cards without owners) as a reliability signal — and to tag all InProgress cards as Blocked when the kill-switch fires.
    - Kept the team at 13 agents. No new roles.
  changes_from_v3:
    - Removed Hermes; provider set is now Anthropic / OpenAI / Google only.
    - Advisor pool reduced to [gemini_31_pro, gpt_54]; provider-diversity rule still satisfiable for every writer case.
    - Promoted backend_engineer from GPT-5.4 to Claude Opus 4.7 so main code-writing (frontend + backend) both run on Claude.
    - Added priority_policy with numeric scoring rubric; M1 critical-path work is hard-prioritized.
    - Added m1_feature_freeze with freeze trigger, allowed/forbidden post-freeze work, rehearsal checklist, and fallback demo artifacts.
    - Expanded security_posture.m1_mvp_demo with a concrete operational_minimums list (no hardcoded secrets, trade-only scope, encrypted secret storage, audit logs, explicit confirmation, 1s emergency stop, daily dollar caps, key rotation).
    - Tightened pr_rejection_flow with a categorical advisor verdict and structured patch plan schema.
    - Added definition_of_done — the halting rule. Severity classes (blocker | major | minor | nit), only blocker rejects PRs, 3-revision cap, force-ship authority, M1 rule that the demo is the release gate, and a turn-budget per ticket.
    - Extended cost_and_health_monitor_policy to cover security triggers (credential mishandling, exchange permission expansion, non-custodial violation, copy-trading drift) — 14th agent avoided.
    - Expanded product_context with product_narrative, user_archetypes, differentiators, non_negotiables.
    - Added milestone_responsibilities block to every role with M1 / M2 / M3 / M4 focus, deliverables, and non_negotiables.
    - Added emergency_stop_control to ui_surfaces (always-visible M1 requirement).
    - Added done_criteria_checklist as a required PR template section.

