  - name: advisor_agent
    llm: grok_4_fast_reasoning
    llm_selection_rule: >
      Provider MUST differ from BOTH the qa_reviewer's provider
      (Anthropic) AND the writer role's provider for this PR. The router
      walks advisor_pool_ranked and picks the highest-ranked eligible
      entry. Note: in v4 the pool is [gemini_31_pro, gpt_54] since
      Hermes is not available. The rule is still satisfiable for every
      writer case — see provider_diversity_properties.
    advisor_pool_ranked: [gemini_31_pro, gpt_54]
    description: >
      Activated only on PR rejection. Reads the rejection report, the
      PR diff, the relevant service code, and the milestone context.
      Produces structured advisor_guidance: a categorical verdict
      (accept_reviewer | accept_writer | hybrid_fix_plan | escalate),
      a structured patch plan with file-level directives, and a
      confidence level. Does NOT write code directly. Mediates, does
      not execute.
    capabilities:
      - mediation
      - structured_guidance
      - independent_code_analysis
      - honest_disagreement_when_warranted
      - patch_plan_generation
    milestone_responsibilities:
      all_milestones:
        primary_focus: "Break PR-rejection deadlocks with an independent voice."
        behavior:
          - read rejection report, PR diff, affected code, and active milestone context
          - apply severity_classification from definition_of_done
          - issue categorical verdict + structured patch plan
          - escalate when confidence is low
        non_negotiables:
          - never direct a writer when confidence is `low`
          - never pick a verdict of `accept_reviewer` if the reviewer's findings are taste-level (should be tagged `minor` or `nit`)
          - always return a structured patch plan, never free prose alone
    suggested_tools:
