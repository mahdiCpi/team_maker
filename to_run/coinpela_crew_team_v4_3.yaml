# ============================================================================
# MILESTONES  (no calendar dates; sequenced by dependency and quality bar)
# ============================================================================

milestone_context:
  philosophy: >
    Milestones are dependency-ordered quality gates. Each has a primary
    goal, a release posture, focus items, acceptance criteria, and
    explicit out-of-scope items. Agents ship as soon as acceptance
    criteria are met and the release gate passes. No calendar waiting.

  milestones:

    - id: m1
      name: "MVP — Investor Demo"
      sequence: 1
      priority: HIGHEST
      primary_goal: >
        Create investor conviction through a live end-to-end proof that
        turns a plain-language request into a real crypto bot flow with
        marketplace visibility. A demo, not a product, but it must feel
        like a product.
      release_posture: demo_only_rehearsed
      release_gate: "three_consecutive_rehearsed_end_to_end_runs_pass_plus_fallback_artifacts_ready (see m1_feature_freeze and definition_of_done.m1_special_rule)"
      focus:
        - ai_buddy voice and text
        - ai_buddy_profile_and_tuning (basic personality / hard limits)
        - quick backtest or evidence layer
        - explicit user confirmation before live deploy
        - real Coinbase Advanced Trade proof-of-life (with paper-trading fallback)
        - live monitoring dashboard
        - emergency stop control
        - seeded marketplace browse / detail / subscribe / list flows
      guardrails:
        - Keep scope narrow, dramatic, and reliable.
        - Crypto only.
        - Prioritize the demo arc over extra feature count.
        - Freeze new features the moment the demo arc passes three rehearsed runs.
        - The investor demo script is a product requirement, not an afterthought.
      acceptance_criteria:
        - Buddy correctly parses at least 5 canonical plain-language prompts into valid bot configs.
        - At least 2 credible bot types deployable end-to-end (e.g., Grid, DCA).
        - Quick backtest visible before live deploy; user must confirm.
        - Coinbase live order placed with strict demo risk limits and emergency stop; fills appear in dashboard within 3s p95.
        - Marketplace UI shows seeded listings with detail pages and subscribe flow; listing a strategy writes to real storage.
        - User can open their Buddy profile, adjust personality / hard limits, and Buddy behavior changes accordingly.
        - Three rehearsed end-to-end demo runs pass without manual intervention.
        - A recorded fallback demo exists in case of live-API failure during an investor meeting.
      explicitly_out_of_scope:
        - stocks or any non-crypto asset
        - external creator publishing
        - billing and payouts
        - advanced agentic orchestration
        - social/news intelligence as a core dependency
        - proprietary ML or HFT
        - production-grade security hardening (see m1 operational_minimums for the M1 floor)

    - id: m2
      name: "Product V1.0 — First Usable Product"
      sequence: 2
      priority: high
      primary_goal: >
        Convert the demo into the first usable self-serve crypto product
        a motivated non-technical user can operate without team hand-holding.
      release_posture: controlled_pilot
      release_gate: "all m2 acceptance_criteria pass + m2 security_posture verified + pilot onboarding session recorded cleanly"
      focus:
        - production-grade auth and credential handling
        - full app navigation across AI Buddy, Portfolio, Market, Bots, Strategy Library, Marketplace, Settings
        - 3 to 5 productized prebuilt strategy templates
        - backtesting and core analytics
        - operational internal marketplace with real CoinPela-managed listings
        - crypto-strong architecture ready for future expansion
        - ai_buddy_profile_and_tuning expanded (persisted preferences, steer presets)
      guardrails:
        - Do not force stocks into this milestone.
        - Product coherence matters more than breadth.
        - Security posture flips from demo to production (see security_posture map).
      acceptance_criteria:
        - End-to-end onboarding -> exchange connect -> deploy bot -> monitor works for a non-technical test user in a recorded session.
        - Auth meets m2 security_posture requirements; secrets live only in Google Secret Manager.
        - 3-5 strategy templates fully productized with backtests available from UI and Buddy.
        - Marketplace listings have real performance pages and real subscription state.
        - Buddy tuning persists across sessions and can be exported/imported.

    - id: m3
      name: "Product V1.1 — Platform Expansion"
      sequence: 3
      priority: medium
      primary_goal: >
        Expand CoinPela into a broader platform where crypto and stocks
        are live in one product and AI Buddy can compose richer,
        more contextual strategies.
      release_posture: broader_internal_selected_users
      release_gate: "all m3 acceptance_criteria pass + cross-asset regressions clean + advisory pipeline sanitization verified"
      focus:
        - stocks alongside crypto (first broker integration)
        - combined strategy composition
        - advisory news, social, or document context (RAG)
        - cross-asset monitoring
        - creator readiness or limited creator workflow/API
      guardrails:
        - Advisory context must not turn into copy trading.
        - Simplicity must survive increased capability.

    - id: m4
      name: "Product V1.2 — Commercial Credibility"
      sequence: 4
      priority: medium
      primary_goal: >
        Make CoinPela commercially credible through creator publishing,
        monetization, credits, adaptive recommendations, and early
        moat signals.
      release_posture: friendly_external_users
      release_gate: "all m4 acceptance_criteria pass + pen-test complete + moderation pipeline verified + billing correctness tests clean"
      focus:
        - creator publishing and moderation
        - billing and subscription infrastructure
        - credits and packaging
        - adaptive recommendations
        - first differentiated model layer
        - gated advanced modes and production hardening
      guardrails:
        - Commercial credibility matters more than feature theater.
        - Advanced modes must not destabilize the core product.


