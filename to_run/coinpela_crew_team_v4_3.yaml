# ============================================================================
# CoinPela — Autonomous Product Team Recipe (v4.3)
# ============================================================================
# team_maker reads this file together with every file in
# `auxiliary_resources_dir` and generates a 13-agent autonomous team that
# plans and implements CoinPela from M1 (investor demo) through M4
# (commercially credible platform).
#
# MISSION: This YAML is the single source of truth for the entire CoinPela
# team. A team generated from this file must be able to deliver the complete
# product WITHOUT any human intervention after kickoff. Every lesson learned
# in previous runs is encoded here as a permanent rule.
#
# ============================================================================
# CRITICAL RUNTIME REQUIREMENTS — READ BEFORE GENERATING ANY TEAM
# ============================================================================
#
# WORKSPACE_ROOT must be set to the PARENT directory of all git repos.
#   Correct:   WORKSPACE_ROOT=/home/user/projects
#              (repos live at /home/user/projects/coinpela-frontend, etc.)
#   Wrong:     WORKSPACE_ROOT=/home/user/projects/cpi_dev_team/workspace
#              (this creates a separate workspace dir that is NOT the live repos)
#   Why: When WORKSPACE_ROOT is set correctly, file-write tools create files
#   owned by the current user. Agents can run pytest and start services
#   on the files they just wrote. The _auto_push safety-net also works
#   correctly because the workspace IS the repo.
#
# SANDBOX_ENABLED must be false.
#   Why: SANDBOX_ENABLED=true runs the code execution sandbox as Docker root,
#   creating root-owned files. Root-owned files cannot be:
#     - Modified by the host user (permission denied)
#     - Read by pytest running as the host user (silent test failures)
#     - Correctly identified as changed by git status
#   The sandbox provides no meaningful security benefit for a dev agent team
#   working on your own repos. Set SANDBOX_ENABLED=false.
#
# CREWAI_VERSION must be >= 1.14.3
#   Why: 1.14.2 has a bug where Anthropic (Claude) models crash with
#   "assistant message prefill" on heavy tasks. 1.14.3 fixes this.
#   All coding agents use Claude — this bug prevents them from working.
#
# ============================================================================
#
# changes_from_v4_2
#   - Added top-level notification_channels block with a Telegram channel
#     (TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID read from shell environment).
#   - team_maker now generates a telegram_sender tool and binds it to
#     cost_and_health_monitor, program_manager_orchestrator,
#     product_architect_tech_lead, and qa_reviewer_release_gatekeeper per
#     notification_channels.telegram.routing.
#   - Extended cost_and_health_monitor kill-switch on_trigger list and
#     execution_pattern.halt_path to fan out halts over Telegram in addition
#     to webhook + email.
#   - Routing rules keep Telegram for halts, digests, M1 rehearsal recaps, and
#     feature-freeze declarations only — routine card transitions and per-PR
#     review comments stay off Telegram to avoid noise.
#
# v4.2 changes vs v4.1 (architecture posture: multi-repo, multi-service):
#   * Flipped the default from modular-monolith to multi-repo /
#     multi-service from day one. Every service is its own repo with
#     its own CI, its own Dockerfile, its own deployment pipeline.
#   * New `service_architecture` top-level section recommends 7-8 M1
#     repos (frontend, buddy, execution, strategy, marketplace,
#     identity, platform, + optional notifications) with the full
#     rationale. product_architect_tech_lead has documented authority
#     to merge or split before M1 implementation starts, with written
#     justification.
#   * `git_account` promoted to a repo registry with per-service
#     branch protection, required CI jobs, and required labels.
#   * New `contracts_policy` top-level section. Contract format is
#     architect's choice per service: REST/OpenAPI for external-facing,
#     gRPC/Protobuf for internal. Decision must be documented per
#     service with criteria. Contracts live in the platform repo.
#   * New `local_dev_policy` — docker-compose stack in platform repo
#     brings the full M1 system up in one command. Every service has
#     a healthcheck and a mock mode.
#   * New `m1_microservices_guardrails` — honest about the risks
#     multi-service adds to a demo, with concrete mitigations
#     (one-command local stack, integration tests from day one, mock
#     modes, service-down fallbacks, no service in demo without
#     fallback).
#   * `progress_tracking.schema` extended with `Repo` and
#     `ServiceOrSurface` fields. Board filters by repo.
#   * `product_architect_tech_lead` M1 deliverables now include
#     service boundary approval, contract approval per service, and
#     Buddy control-plane interface approval.
#   * `platform_devops_engineer` M1 deliverables now include
#     bootstrapping all 7-8 repos, branch protection per repo,
#     per-repo CI, cross-repo GitHub Project board, and the
#     docker-compose local-dev stack in the platform repo.
#   * `cost_and_health_monitor` watches for contract mismatches
#     between repos and service-health drift in the local and staging
#     stacks.
#   * `m1_feature_freeze.forbidden_post_freeze_work` adds
#     "no new services" and "no contract changes" to the freeze rules.
#   * Explicit architectural constraint: Buddy drives runtime bot
#     adjustments, so buddy -> execution and buddy -> strategy
#     control-plane contracts are first-class M1 artifacts.
#
# v4.1 changes vs v4.0 (NO new agents — behavior added to existing roles):
#   * New `progress_tracking` top-level section defining a GitHub Projects
#     v2 board schema, views, and automation rules. Board is the single
#     live source of truth for "where are we" on the project.
#   * New `board_update_protocol` every agent follows when creating,
#     moving, or closing a ticket — so board state is always current
#     without a dedicated reporter agent.
#   * `program_manager_orchestrator` gains explicit digest duties
#     (daily progress summary, M1 rehearsal recap, weekly milestone
#     summary) posted to the board and the founder webhook on a defined
#     cadence, in a defined format.
#   * `platform_devops_engineer` M1 deliverables extended to include
#     "bootstrap the GitHub Projects board per progress_tracking.schema"
#     as a first-run setup task.
#   * PR template gains a required `project_board_card_link` field so
#     the card-to-PR link is enforced, not optional.
#   * `qa_reviewer_release_gatekeeper` checks the card link on every PR.
#   * `cost_and_health_monitor` watches for board drift (tickets with
#     no matching card, cards with no owner, cards stuck in a state
#     beyond threshold) as a new reliability signal.
#
# v4 headline changes vs v3:
#   * Hermes removed entirely. Providers are Anthropic, OpenAI, Google.
#   * Main code-writing (backend + frontend) runs on Claude Opus 4.7.
#   * New `priority_policy` with numeric scoring rubric.
#   * New `m1_feature_freeze` block with explicit freeze trigger,
#     allowed/forbidden post-freeze work, rehearsal checklist, and
#     fallback demo artifacts.
#   * Expanded operational `security_posture.m1_mvp_demo.operational_minimums`.
#   * Tightened `pr_rejection_flow` — advisor now returns a CATEGORICAL
#     verdict plus a structured patch plan, not free prose.
#   * New `definition_of_done` section — the halting rule. Severity
#     classes, revision cap, force-ship authority, and the M1 rule that
#     the DEMO is the release gate, not the code review.
#   * Extended `cost_and_health_monitor_policy` to halt on security
#     violations (credential mishandling, unsafe permission expansion,
#     non-custodial violation, copy-trading drift) — no 14th agent needed.
#   * Every role now has `milestone_responsibilities` spelling out what
#     it owns in M1, M2, M3, M4.
#
# Key principles (enforced throughout):
#   1. M1 is the most important milestone. Investor demo. Ships fast and
#      reliably. Narrow, dramatic, polished.
#   2. No calendar pauses. Milestones are sequencing and quality gates,
#      not dates.
#   3. Tools per role are SUGGESTIONS. team_maker uses an LLM to design
#      the final tool signatures and implementations.
#   4. No budget cap, but cost_and_health_monitor watches spend, errors,
#      and security heuristics, and can halt the whole team
#      (webhook + email).
#   5. On PR rejection, an advisor_agent (provider != reviewer &&
#      provider != writer) mediates before work returns to the writer.
#   6. M1 security posture is demo/POC with a strict operational minimum
#      list. M2+ is production-grade.
#   7. Work terminates. See `definition_of_done`.
# ============================================================================

team_name: "CoinPela Autonomous Product Team"
recipe_version: "4.2"
replaces_recipe_version: "4.1"
template: software_delivery_team
documentation_level: detailed
overwrite: false
output_path: "~/gen_ai_codes/cpi_dev_team"

documentation_policy:
  local_docs_dir: "workspace/docs"
  structure: "workspace/docs/<agent_role>/"
  style: >
    Short and effective. No filler, no repetition. Max one page per topic.
    Use bullet points and code blocks — not prose paragraphs. A reader must
    be able to act on the doc in under two minutes. The coder agents should 
    consider modularity and reusability of the code. They must try encapsulation
    and abstraction. They must try to avoid code duplication. The must try to
    follow the DRY ("Don't Repeat Yourself") principle. They must try to follow 
    the KISS ("Keep It Simple, Stupid") principle. They must
    try to follow the YAGNI ("You Aren't Gonna Need It") principle. They must try 
    to follow the SOLID principles. They must try to follow the GRASP principles.
    They must try to follow the CQS ("Command Query Separation") principle. They must 
    try to follow the ISP ("Interface Segregation Principle") principle. They must try 
    to follow the SRP ("Single Responsibility Principle") principle. They must try to 
    follow the OCP ("Open Closed Principle") principle. They must try to follow the 
    LSP ("Liskov Substitution Principle") principle. They must try to follow the 
    DIP ("Dependency Inversion Principle") principle. They must try to follow the 
    CoR ("Chain of Responsibility") principle. They must try to follow the Iterator 
    principle. They must try to follow the Mediator principle. They must try to follow 
    the Observer principle. They must try to follow the Strategy principle. They must 
    try to follow the Template Method principle. They must try to follow the Visitor 
    principle. They must try to follow the State principle. They must try to follow the 
    Strategy pattern.
  per_agent_responsibility: >
    Every agent writes its own documentation to workspace/docs/<agent_role>/.
    Technical agents document: design decisions, interfaces, usage, known
    limits. Non-technical agents document: decisions made, rationale, open
    questions. Do NOT document what is obvious from the code — only the why
    and the non-obvious how.
  aggregation: >
    program_manager_orchestrator collects all per-agent docs after each task
    completes and pushes them to coinpela-platform/docs/ via git_account.
    It also updates the GitHub Project board card statuses and the milestone
    summary digest.
  push_trigger: "after each task completes and at M1 feature-freeze declaration"

purpose: >
  Create an autonomous 13-agent software delivery team for CoinPela that
  plans, designs, implements, reviews, tests, deploys, documents, and
  reports on the staged development of the CoinPela product. The team
  must treat Milestone 1 (investor-demo MVP) as the highest-priority
  deliverable, ship continuously at LLM-paced velocity, and escalate
  blockers immediately. Agents must understand CoinPela as an AI-powered,
  non-custodial trading co-pilot centered on AI Buddy, a broker/strategy
  marketplace, and a multi-asset future (crypto first, stocks later).
  The team must accept high-level founder commands, break them into
  milestone-aligned plans, decompose the system into justified services
  or modules, carry out implementation through Git-based workflows, and
  keep every release aligned to the current product stage. Work must
  always terminate per the definition_of_done section — agents do not
  iterate forever.
  The ost critical point is the AI buddy that should work for a demo in front of the investors. 
  It should be able to trade and manage the portfolio and the strategies.

tags:
  - fintech
  - startup
  - mvp
  - ai-trading
  - marketplace
  - multi-asset
  - full-stack
  - autonomous-agents
  - crewai


# ============================================================================
# AUXILIARY RESOURCES
# ============================================================================

auxiliary_resources_dir: "~/gen_ai_codes/coinpela_inputs"

auxiliary_resources:
  purpose: >
    Shared source of truth for both team_maker and every agent it creates.
    team_maker loads these files once, distills them into the initial
    system prompt context for each role per `used_by`, and mounts the
    originals read-only on each agent's filesystem.
  distribution_policy:
    load_mode: both_prompt_context_and_filesystem
    prompt_context_mode: concise_summary_with_page_references
    filesystem_mode: read_only_mount
    refresh_policy: team_maker_refreshes_on_recipe_update
  expected_contents:
    - name: design_source
      file: "Design_File.pdf"
      type: figma_export_pdf
      pages: 30
      description: >
        Complete Figma UI export for CoinPela. Covers onboarding, AI Buddy
        chat, dashboard, broker marketplace, broker detail, my brokers,
        portfolio, settings, strategy builder, fast/deep test results,
        creator/listing flow, and risk/analytics views. Visual source of
        truth for every UI surface.
      used_by:
        - design_systems_specialist
        - frontend_engineer
        - marketplace_ux_strategist
        - marketplace_creator_strategist
        - marketplace_lead
        - product_architect_tech_lead
        - qa_reviewer_release_gatekeeper
    - name: milestone_roadmap
      file: "CoinPela_Milestone_Execution_Plan_Detailed_Team_v2.docx"
      type: docx
      description: >
        Internal-team milestone operating map. Explains milestone intent,
        vision progression per milestone, key deliverables, explicit
        out-of-scope items, and readiness/quality bars. Source of truth
        for milestone interpretation.
      used_by: all_agents
    - name: team_recipe
      file: "coinpela_crew_team_v4_2.yaml"
      type: yaml
      description: This recipe file itself.
      used_by:
        - team_maker
        - program_manager_orchestrator
        - product_architect_tech_lead
    - name: planning_tips
      file: "planning_tips.docx"
      type: docx
      description: >
        Critical planning guidance for the program manager and team maker.
        Must be read before producing any plan or assigning tasks. Contains
        principles for good milestone planning, task decomposition, and
        GitHub Project board setup.
      used_by:
        - program_manager_orchestrator
        - product_architect_tech_lead
        - team_maker
    - name: coding_agents_specs
      file: "coding_agents_specs.txt"
      type: txt
      description: >-
        Mandatory 14-step coding workflow for every agent that writes code.
        Defines: read state -> confirm scope -> sync git -> write tests ->
        implement -> lint/typecheck -> run tests -> review diff -> update docs
        -> push -> PR with evidence -> review -> merge -> notify PM.
        Also: scope_confirmation format, FinTech security checklist,
        demo_impact assessment, no-merge-without-evidence rule.
        team_maker injects this into the system prompt for any agent
        that has code_writer in its tool list.
      used_by:
        - backend_engineer
        - frontend_engineer
        - quant_ml_engineer
        - platform_devops_engineer
        - product_architect_tech_lead
        - team_maker
    - name: founder_commands
      file: "founder_commands.md"
      type: markdown
      optional: true
      description: >
        Optional running log of high-level commands from the founder. If
        present, program_manager_orchestrator treats it as the input queue.
      used_by:
        - program_manager_orchestrator
        - product_architect_tech_lead
  team_maker_responsibilities:
    - Ingest every file in auxiliary_resources_dir before generating agents.
    - For each role, inject a distilled summary of the files in its `used_by` list into the agent's system prompt.
    - Mount the full auxiliary_resources_dir read-only on every agent's filesystem.
    - If a required file is missing or malformed, escalate to the human supervisor via cost_and_health_monitor BEFORE spawning the team.


# ============================================================================
# TECH STACK
# ============================================================================

stack:
  language: "Python 3.11"
  backend_framework: "FastAPI"
  frontend_framework: "React 18"
  frontend_language: "TypeScript"
  styling: "Tailwind CSS"
  database: "PostgreSQL 15"
  timeseries_db: "TimescaleDB (PostgreSQL 14 extension) — tick data, OHLCV, trades, bot metrics"
  vector_db: "Qdrant — Buddy conversation memory, strategy semantic search"
  caching: "Redis 7"
  containerization: "Docker"
  ci_cd: "GitHub Actions"
  cloud: "Google Cloud"
  auth: "Firebase Auth"
  realtime: "WebSockets (FastAPI native)"
  crypto_integration: "Coinbase Advanced Trade API"
  stock_integration: "deferred_to_m3"
  secrets_manager: "Google Secret Manager"
  observability: "Cloud Logging + OpenTelemetry"
  analytics: "BigQuery"
  quant_libraries:
    indicators: "pandas_ta — technical indicators computed on OHLCV DataFrames from TimescaleDB"
    backtesting: "vectorbt — vectorized backtesting on TimescaleDB data, replaces zipline/backtrader"
    data_access: "psycopg2 / SQLAlchemy — direct TimescaleDB queries for OHLCV and tick data"
    vector_client: "qdrant-client — Buddy memory and strategy embedding search"


# ============================================================================
# DATA INFRASTRUCTURE
# ============================================================================

data_infrastructure:

  timescaledb:
    role: "Primary time-series and transactional store"
    host_env: TIMESCALEDB_HOST
    port_env: TIMESCALEDB_PORT
    database_env: TIMESCALEDB_DB
    user_env: TIMESCALEDB_USER
    password_env: TIMESCALEDB_PASSWORD
    default_host: "localhost"
    default_port: 5432
    default_db: "coinpela"
    default_user: "coinpela"
    docker_container: "timescaledb"
    docker_network: "coinpela_net"
    hypertables:
      ohlcv:
        columns: [time, symbol, exchange, granularity, open, high, low, close, volume]
        partition: time
        use: "OHLCV candles for backtesting and live indicator computation"
      ticks:
        columns: [time, symbol, exchange, price, size, side]
        partition: time
        use: "Raw trade ticks from Coinbase Advanced Trade"
      trades:
        columns: [time, bot_id, user_id, symbol, side, qty, price, status, order_id, audit_hash]
        partition: time
        use: "Append-only audit log of every bot trade action"
      bot_metrics:
        columns: [time, bot_id, user_id, pnl, pnl_pct, drawdown, position, unrealised]
        partition: time
        use: "Bot performance sampled every minute for dashboard and risk monitoring"
      backtest_results:
        columns: [id, created_at, strategy, symbol, params, start_date, end_date, total_return, sharpe, max_drawdown, num_trades, summary]
        partition: none
        use: "Backtest run history shown in Buddy evidence layer"
    agent_usage:
      quant_ml_engineer: >
        Primary consumer. Loads OHLCV data via pandas + psycopg2. Runs
        pandas_ta to compute indicators (RSI, EMA, Bollinger, ATR, MACD).
        Feeds DataFrames into vectorbt for backtesting. Writes backtest_results.
        Always use TimescaleDB for data — never hardcode or generate synthetic data.
      backend_engineer: >
        Writes trades and bot_metrics in real time from the execution engine.
        Reads bot_metrics for dashboard WebSocket streaming. Writes ticks
        from Coinbase feed ingestion. All writes are append-only.
      cost_and_health_monitor: >
        Reads bot_metrics to detect drawdown breaches and abnormal PnL swings.
        Reads trades to count suspicious rapid-fire order patterns.

  qdrant:
    role: "Vector store for semantic search and AI Buddy memory"
    host_env: QDRANT_HOST
    port_env: QDRANT_PORT
    default_host: "localhost"
    default_port: 6333
    docker_container: "qdrant"
    docker_network: "coinpela_net"
    collections:
      buddy_memory:
        description: "Embeddings of past Buddy conversations per user"
        use: >
          When a user opens Buddy, retrieve the 5 most semantically similar
          past conversations to seed Buddy's context. This makes Buddy feel
          like it remembers the user's style, risk tolerance, and past decisions.
        embedding_model: "text-embedding-3-small (OpenAI) or equivalent"
        payload_fields: [user_id, conversation_id, timestamp, summary, strategy_chosen]
      strategy_embeddings:
        description: "Embeddings of strategy descriptions and parameter sets"
        use: >
          When a user describes a strategy in plain language to Buddy,
          semantic-search the strategy_embeddings collection to find the
          closest matching template. Return top-3 candidates with similarity
          scores for Buddy to present as suggestions.
        payload_fields: [strategy_name, description, params_schema, risk_level, asset_class]
    agent_usage:
      backend_engineer: >
        Writes to buddy_memory after each Buddy conversation ends.
        Reads from buddy_memory at Buddy session start to hydrate context.
        Reads from strategy_embeddings when Buddy receives a user strategy request.
        Use qdrant-client Python SDK.
      quant_ml_engineer: >
        Writes strategy_embeddings when a new strategy template is created.
        Update embeddings when template descriptions or parameters change.

  data_stack_compose:
    location: "workspace/data_stack/docker-compose.yml"
    start_command: "docker compose -f workspace/data_stack/docker-compose.yml up -d"
    note: >
      Both TimescaleDB and Qdrant must be running before the CoinPela
      backend or strategy services start. platform_devops_engineer is
      responsible for ensuring the data stack is healthy in the local-dev
      docker-compose and in staging.


# ============================================================================
# QUANT LIBRARY USAGE GUIDE
# ============================================================================

quant_library_guide:

  pandas_ta:
    version: ">=0.3.14b"
    purpose: "Technical indicator computation on OHLCV DataFrames"
    pattern: >
      Load OHLCV from TimescaleDB into a pandas DataFrame with 'time' as
      the index. Call df.ta.rsi(), df.ta.ema(), df.ta.bbands(), df.ta.macd(),
      df.ta.atr() etc. All indicators attach directly to the DataFrame.
      Always set 'time' as a DatetimeIndex before calling pandas_ta.
    example_use_cases:
      - Grid strategy: ATR for grid spacing, EMA for trend filter
      - DCA strategy: RSI for entry timing, MACD for trend confirmation
      - Evidence layer: show last 30-day indicator chart to user before confirmation
    do_not: "Do not compute indicators from synthetic or hardcoded data. Always query TimescaleDB."

  vectorbt:
    version: ">=0.26.0"
    purpose: "Vectorized backtesting — replaces zipline and backtrader"
    why_not_zipline: "zipline is unmaintained and incompatible with Python 3.12"
    why_not_backtrader: "backtrader is event-driven and too slow for interactive demo use"
    pattern: >
      Load OHLCV from TimescaleDB. Compute entry/exit signals using pandas_ta.
      Pass price series and boolean signal arrays to vbt.Portfolio.from_signals().
      Extract stats: total_return, sharpe_ratio, max_drawdown, win_rate.
      Write results to backtest_results table. Target sub-5s runtime for M1 demo.
    output_to_buddy: >
      Buddy reads backtest_results from TimescaleDB and presents a plain-language
      summary: "Over the last 90 days this strategy returned X% with a max drawdown
      of Y%. It made Z trades." The user sees this before confirming a live bot.
    do_not: "Do not run backtests longer than 1 year for the M1 demo — it must finish in under 5 seconds."

  qdrant_client:
    version: ">=1.7.0"
    purpose: "Vector search for Buddy memory and strategy matching"
    pattern: >
      from qdrant_client import QdrantClient
      client = QdrantClient(host=os.environ['QDRANT_HOST'], port=int(os.environ['QDRANT_PORT']))
      Use client.upsert() to store embeddings. Use client.search() to retrieve
      top-k similar vectors. Always include a payload with metadata so results
      are actionable without a second DB lookup.

  psycopg2_timescaledb:
    version: "psycopg2-binary>=2.9"
    pattern: >
      conn_str = f"postgresql://{user}:{password}@{host}:{port}/{db}"
      engine = sqlalchemy.create_engine(conn_str)
      df = pd.read_sql("SELECT * FROM ohlcv WHERE symbol=%s ORDER BY time DESC LIMIT 10000",
                       engine, params=('BTC-USD',), index_col='time', parse_dates=['time'])
    note: >
      Always parameterise queries. Never use f-strings for SQL. Use
      sqlalchemy or psycopg2 with %s placeholders only.


# ============================================================================
# BUDDY CONVERSATION → STRATEGY FLOW
# ============================================================================

buddy_strategy_flow:
  description: >
    This is the core M1 investor demo loop. Every agent must understand it.
    A user talks to AI Buddy in plain language. Buddy turns that into a
    running trading bot. The user never writes code or configures anything manually.
  steps:
    1_user_intent: >
      User types or speaks a goal, e.g. "I want to DCA into Bitcoin weekly
      with $50, stop if I'm down 20%". Buddy is a FastAPI WebSocket endpoint
      served by the buddy service (coinpela-buddy repo).
    2_semantic_search: >
      backend_engineer's Buddy service embeds the user message and queries
      Qdrant strategy_embeddings collection to find the closest matching
      strategy template. Returns top-3 with similarity scores.
    3_parameter_extraction: >
      Buddy (LLM call) extracts structured parameters from the user's message:
      strategy=DCA, asset=BTC-USD, amount=50, frequency=weekly, stop_loss_pct=20.
      Validates against the strategy template's params_schema.
    4_evidence_layer: >
      quant_ml_engineer's strategy service runs a vectorbt backtest on
      TimescaleDB OHLCV data. Returns: total_return, max_drawdown, num_trades,
      sharpe. Buddy presents this in plain language with a mini chart.
    5_user_confirmation: >
      Buddy asks "Shall I start this bot?" User must explicitly say yes.
      No trade is ever placed without explicit confirmation. This is enforced
      at both the Buddy service layer and the execution API layer.
    6_bot_launch: >
      On confirmation, Buddy calls the execution service (coinpela-execution)
      to create a bot with the validated config. Execution service connects
      to Coinbase Advanced Trade API (trade-only scope) and begins running
      the strategy template.
    7_live_monitoring: >
      The dashboard polls bot_metrics from TimescaleDB via WebSocket.
      User sees live PnL, position, and drawdown. Emergency stop button
      always visible — calls execution service halt endpoint.
    8_buddy_memory: >
      After session ends, backend_engineer's service writes a conversation
      embedding to Qdrant buddy_memory so future sessions feel personalised.


# ============================================================================
# GIT ACCOUNT AND REPO REGISTRY  (multi-repo, multi-service)
# ============================================================================
# CoinPela is a multi-service system from day one. Every service listed
# below is its own GitHub repository with its own CI, Dockerfile, and
# deployment pipeline. product_architect_tech_lead has documented
# authority to merge or split these repos before M1 implementation
# begins, with written justification in the repo README of whichever
# side of the decision survives.
# ============================================================================

git_account:
  platform: github
  token_env: GITHUB_TOKEN
  org_or_user: "mahdiCpi" # @ CoinPela Inc  # REPLACE BEFORE USE
  default_visibility: private

repo_registry:

  posture: multi_repo_multi_service_from_day_one
  architect_decision_authority: >
    product_architect_tech_lead MAY merge or split the recommended M1
    repos before M1 implementation begins, with a written rationale
    committed to the affected repo README(s). Merges/splits after
    implementation begins require written rationale plus orchestrator
    approval and trigger a board-drift alert.

  conventions:
    naming: "coinpela-{service}"
    default_branch: main
    protected_branches: [main, "release/*"]
    required_labels:
      - "milestone:m1"
      - "milestone:m2"
      - "milestone:m3"
      - "milestone:m4"
      - "severity:blocker"
      - "severity:major"
      - "severity:minor"
      - "severity:nit"
      - "human-gate-required"
    required_ci_jobs_per_repo:
      - tests
      - lint
      - secret_scan
      - contract_check       # verifies no breaking contract change without version bump
      - dockerfile_build
      - license_check
    pr_template_source: coinpela-platform
    bootstrap_owner: platform_devops_engineer

  m1_recommended_repos:

    - name: coinpela-platform
      purpose: >
        Shared "glue" repo. Holds the canonical OpenAPI / Protobuf
        contract definitions for every inter-service API, the
        docker-compose stack that brings the full M1 system up
        locally in one command, shared infrastructure-as-code, the
        canonical PR template, and shared CI workflows. Every other
        service repo imports contracts from here as a versioned
        dependency.
      contents:
        - "contracts/{service}/{version}/*.openapi.yaml or *.proto"
        - "docker-compose.yaml  # full M1 stack"
        - "ci-workflows/           # reusable GitHub Actions"
        - "iac/                    # Terraform or equivalent"
        - "docs/                   # architecture decisions, runbooks"
      owners: [product_architect_tech_lead, platform_devops_engineer]
      importance: >
        This is the contract authority for the whole team. Breaking
        changes here cascade; most changes here require
        product_architect_tech_lead signoff.

    - name: coinpela-frontend
      purpose: "React/TypeScript web application; all user-facing UI; AI Buddy chat surface; marketplace; dashboard; emergency stop UI."
      primary_owner: frontend_engineer
      consumes_contracts_from: [coinpela-buddy, coinpela-execution, coinpela-strategy, coinpela-marketplace, coinpela-identity]
      external_or_internal: external

    - name: coinpela-buddy
      purpose: >
        AI Buddy orchestration service. Converts plain-language user
        intent into bounded strategy configs. Owns the Buddy profile
        (personality, framing, hard limits). Exposes both a creation
        interface (new bot from prompt) AND a runtime control-plane
        interface, because users adjust live bots by talking to
        Buddy — see contracts_policy.buddy_control_plane.
      primary_owner: backend_engineer
      collaborates_with: [quant_ml_engineer]
      consumes_contracts_from: [coinpela-strategy, coinpela-execution, coinpela-identity]
      exposes_contracts_to: [coinpela-frontend]
      external_or_internal: external_via_frontend_internal_elsewhere

    - name: coinpela-execution
      purpose: >
        Exchange integration (Coinbase Advanced Trade for M1), order
        placement, fills ingestion, positions, audit log (append-only),
        emergency stop endpoint. Load-bearing trade path. Trade-only
        API scope enforced at this boundary.
      primary_owner: backend_engineer
      consumes_contracts_from: [coinpela-strategy, coinpela-identity]
      exposes_contracts_to: [coinpela-buddy, coinpela-frontend]
      external_or_internal: internal
      security_critical: true

    - name: coinpela-strategy
      purpose: >
        Strategy templates (Grid, DCA for M1; 3-5 productized for M2),
        backtesting engine (fast + deep), risk analytics, evidence
        layer rendered to Buddy before user confirmation.
      primary_owner: quant_ml_engineer
      collaborates_with: [backend_engineer]
      consumes_contracts_from: [coinpela-identity]
      exposes_contracts_to: [coinpela-buddy, coinpela-execution, coinpela-frontend]
      external_or_internal: internal

    - name: coinpela-marketplace
      purpose: >
        Listings, detail pages, subscribe flow, seeded data for M1.
        Grows into CoinPela-managed real listings (M2), limited
        creator workflow (M3), and full self-serve publishing with
        payouts (M4).
      primary_owner: backend_engineer
      collaborates_with: [marketplace_ux_strategist, marketplace_creator_strategist, marketplace_lead]
      consumes_contracts_from: [coinpela-strategy, coinpela-identity]
      exposes_contracts_to: [coinpela-frontend]
      external_or_internal: external_via_frontend

    - name: coinpela-identity
      purpose: >
        Firebase Auth integration, account connection flows, exchange
        credential storage (trade-only scope, demo env-var at M1,
        Secret Manager at M2+), user profile, Buddy profile
        persistence.
      primary_owner: backend_engineer
      exposes_contracts_to: [coinpela-buddy, coinpela-execution, coinpela-strategy, coinpela-marketplace, coinpela-frontend]
      external_or_internal: internal
      security_critical: true

  m1_optional_8th_repo:
    - name: coinpela-notifications
      purpose: >
        Alerts, email/webhook fan-out, in-app notifications. Optional
        for M1 — can live inside coinpela-execution or coinpela-platform
        initially. Architect decides. Splitting it out early is
        worthwhile if the founder_alert pipeline and user-facing
        notifications are expected to share infrastructure.
      primary_owner: backend_engineer
      architect_split_decision_deadline: before_m1_implementation_begins

  m3_additional_repos:
    - name: coinpela-stocks-broker
      purpose: "First stocks broker integration; parallels coinpela-execution for crypto."
    - name: coinpela-advisory
      purpose: "RAG pipeline, news/social context; feeds Buddy but never executes."

  m4_additional_repos:
    - name: coinpela-billing
      purpose: "Subscriptions, credits, payouts, fraud monitoring."
    - name: coinpela-moderation
      purpose: "Creator publishing moderation pipeline (automated + human review)."

  explicit_architectural_constraints:
    - name: buddy_drives_runtime_bot_adjustments
      description: >
        Users adjust live bots by talking to Buddy, not by editing
        config files. This means coinpela-buddy needs a runtime
        control-plane interface into coinpela-execution (pause, stop,
        adjust risk limits, modify parameters) AND into coinpela-strategy
        (reconfigure template parameters, trigger re-backtest). These
        control-plane contracts are first-class M1 deliverables, not
        afterthoughts.
      owning_contracts: [buddy_execution_control_plane, buddy_strategy_control_plane]
      specified_in: coinpela-platform/contracts/


